<style>

#screen-map{background:linear-gradient(180deg,var(--bg) 0%,var(--blue-pale) 100%);justify-content:flex-start;padding-top:0}.map-header{width:100%;background:var(--white);border-bottom:2px solid var(--border);padding:1rem 1.5rem;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:50}.map-logo{font-weight:900;font-size:20px;color:var(--green)}.map-actions{display:flex;gap:8px;align-items:center;flex-wrap:wrap;justify-content:flex-end}.streak-badge,.xp-badge{display:flex;align-items:center;gap:5px;padding:6px 12px;border-radius:100px;font-size:14px;font-weight:800;border:0}.streak-badge{background:var(--orange-pale);color:var(--text)}.xp-badge{background:#E8EFEA;color:var(--text)}.map-body{width:100%;max-width:480px;padding:2rem 1rem 4rem;display:flex;flex-direction:column;align-items:center}.profile-header{display:flex;align-items:center;gap:14px;padding:16px;background:var(--primary);color:var(--bg);border-radius:14px;width:100%;margin-bottom:18px;box-shadow:0 6px 0 var(--primary-dark)}.avatar{font-size:34px;background:rgba(255,255,255,.12);width:56px;height:56px;display:flex;align-items:center;justify-content:center;border-radius:14px;flex-shrink:0}.profile-text h2{margin:0;font-size:18px;line-height:1.2}.profile-text p{margin:2px 0 0;font-size:12px;opacity:.75}.unit-header-card{width:100%;background:var(--green);border-radius:var(--radius-lg);padding:1.5rem;margin-bottom:1.5rem;text-align:center;box-shadow:0 6px 0 var(--green-d)}.unit-header-card h2{font-size:22px;font-weight:900;color:var(--card);margin-bottom:4px}.unit-header-card p{font-size:14px;color:rgba(255,255,255,.9);line-height:1.4}.unit-picker{width:100%;display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:1.25rem}.unit-pill{border:2px solid var(--border);border-radius:12px;background:var(--white);color:var(--ink);font-weight:900;padding:10px;cursor:pointer}.unit-pill.active{background:var(--blue);border-color:var(--blue-d);color:var(--card)}.unit-pill.locked{opacity:.42;cursor:not-allowed}.lesson-list{width:100%;display:grid;gap:10px}.lesson-card{position:relative;width:100%;background:var(--white);border:2px solid var(--border);border-radius:var(--radius);padding:14px 16px;display:flex;align-items:center;gap:12px;text-align:left;cursor:pointer;box-shadow:0 4px 0 var(--border);font-family:var(--font);color:var(--ink);overflow:hidden}.lesson-card.locked{opacity:.5;cursor:not-allowed}.lesson-card.active{border-color:var(--blue);background:var(--blue-pale)}.lesson-icon{font-size:28px;width:44px;height:44px;border-radius:12px;background:var(--border);display:flex;align-items:center;justify-content:center;flex:0 0 auto}.lesson-copy{position:relative;z-index:2}.lesson-copy h3{font-size:16px;font-weight:900;margin-bottom:2px}.lesson-copy p{font-size:12px;color:var(--ink-soft);font-weight:700}.lesson-fill{position:absolute;inset:0;display:flex;pointer-events:none}.lesson-fill span{width:50%;height:100%;opacity:.25}.lesson-fill .learn-done{background:var(--blue)}.lesson-fill .quiz-done{background:var(--success)}
#screen-lesson{background:var(--bg);justify-content:flex-start;padding:0}.lesson-topbar{width:100%;background:var(--white);border-bottom:2px solid var(--border);padding:1rem 1.5rem;display:flex;align-items:center;gap:1rem;position:sticky;top:0;z-index:50}.back-btn{background:none;border:none;cursor:pointer;font-size:26px;color:var(--ink-soft);padding:4px 8px;line-height:1;border-radius:8px}.progress-bar-outer{flex:1;height:14px;background:var(--border);border-radius:100px;overflow:hidden}.progress-bar-inner{height:100%;background:var(--green);border-radius:100px;transition:width .4s}.hearts{display:flex;gap:4px}.heart{font-size:20px}.heart.lost{filter:grayscale(1);opacity:.3;transform:scale(.8)}.lesson-body{flex:1;width:100%;max-width:720px;margin:0 auto;padding:2rem 1.5rem;display:flex;flex-direction:column}.q-type-label{font-size:13px;font-weight:900;letter-spacing:.06em;text-transform:uppercase;color:var(--blue);margin-bottom:.75rem}.q-text{font-size:clamp(20px,3.5vw,28px);font-weight:900;line-height:1.35;margin-bottom:.75rem}.q-emoji{font-size:56px;text-align:center;margin-bottom:1.25rem}.teach-box{background:var(--white);border:2px solid var(--border);border-radius:var(--radius-lg);padding:1.25rem;margin:1rem 0 1.5rem;box-shadow:0 4px 0 var(--border)}.teach-box h3{font-size:20px;margin-bottom:.5rem}.teach-box p{font-size:17px;color:var(--ink-soft);line-height:1.5}.example-box{margin-top:1rem;background:var(--blue-pale);border-radius:var(--radius);padding:1rem;font-weight:900;font-size:22px}.choices{display:flex;flex-direction:column;gap:12px;margin-bottom:1.5rem}.choice-btn{padding:16px 20px;border-radius:var(--radius);border:2px solid var(--border-d);background:var(--white);font-family:var(--font);font-size:16px;font-weight:800;color:var(--ink);cursor:pointer;text-align:left;transition:all .15s;display:flex;align-items:center;gap:12px;box-shadow:0 4px 0 var(--border)}.choice-btn:not(.disabled):hover{border-color:var(--blue);background:var(--blue-pale);transform:translateX(3px)}.choice-btn.correct{border-color:var(--green);background:var(--success-pale);color:var(--green)}.choice-btn.wrong{border-color:var(--danger);background:var(--danger-pale);color:#A84325}.choice-key{width:34px;height:34px;border-radius:10px;background:var(--border);display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:900;flex-shrink:0}.feedback-banner{border-radius:var(--radius);padding:1.1rem 1.25rem;margin-bottom:1.25rem;display:flex;align-items:flex-start;gap:12px}.feedback-banner.correct{background:var(--success-pale);border:2px solid var(--green)}.feedback-banner.wrong{background:var(--danger-pale);border:2px solid var(--danger)}.fb-icon{font-size:24px;flex-shrink:0}.fb-title{font-size:15px;font-weight:900;margin-bottom:2px}.fb-body{font-size:14px;color:var(--ink-soft);line-height:1.5}.action-row{display:flex;justify-content:flex-end;gap:10px;margin-top:auto;padding-top:1rem}.attempts-row{display:flex;gap:6px;margin-bottom:1rem}.attempt-dot{width:10px;height:10px;border-radius:50%;background:var(--border-d)}.attempt-dot.used{background:var(--danger)}.attempt-dot.remaining{background:var(--green)}
.summary-trophy{font-size:80px;text-align:center;margin-bottom:.5rem}.summary-title{font-size:clamp(26px,5vw,38px);font-weight:900;text-align:center;margin-bottom:.5rem}.summary-sub{font-size:16px;color:var(--ink-soft);text-align:center;margin-bottom:2rem}.summary-stats{display:flex;gap:12px;margin-bottom:2rem;flex-wrap:wrap;justify-content:center}.summary-stat{background:var(--white);border:2px solid var(--border);border-radius:var(--radius);padding:1rem 1.5rem;text-align:center;min-width:100px;box-shadow:0 4px 0 var(--border)}.summary-stat-num{font-size:28px;font-weight:900}.summary-stat-label{font-size:12px;font-weight:900;color:var(--ink-muted);letter-spacing:.04em;text-transform:uppercase}.summary-btns{display:flex;flex-direction:column;gap:10px;width:100%;max-width:340px}.theme-switcher{position:fixed;right:20px;bottom:20px;z-index:1000;display:flex;gap:8px;padding:8px;background:var(--card);border:2px solid var(--border);border-radius:999px;box-shadow:0 4px 0 var(--border)}.theme-switcher button{width:38px;height:38px;border:2px solid var(--border);border-radius:50%;background:var(--bg);cursor:pointer;font-size:17px}.theme-switcher button.active-theme{border-color:var(--accent);box-shadow:0 0 0 3px var(--orange-pale)}.toast{position:fixed;bottom:1.5rem;left:50%;transform:translateX(-50%) translateY(100px);background:var(--ink);color:var(--card);padding:12px 24px;border-radius:100px;font-size:15px;font-weight:800;z-index:999;transition:transform .35s;white-space:nowrap}.toast.show{transform:translateX(-50%) translateY(0)}
[data-theme="neon"] #screen-onboard,[data-theme="neon"] #screen-map,[data-theme="neon"] #screen-summary{background:#0B0F14}[data-theme="neon"] .map-header,[data-theme="neon"] .lesson-topbar{background:rgba(18,26,36,.94);border-color:#2A3442;backdrop-filter:blur(10px)}[data-theme="neon"] .profile-header,[data-theme="neon"] .unit-header-card{background:rgba(18,26,36,.9)!important;border:1px solid #00E5FF;box-shadow:0 0 16px rgba(0,229,255,.22)!important;color:#E6EDF3}[data-theme="neon"] .unit-header-card h2{color:#E6EDF3}[data-theme="neon"] .unit-header-card p{color:#9FB0C1}
@media(max-width:560px){.map-header{align-items:flex-start;gap:12px}.unit-picker{grid-template-columns:repeat(4,1fr)}.summary-stats{gap:8px}.summary-stat{padding:.75rem 1rem;min-width:80px}.theme-switcher{right:10px;bottom:10px}.map-actions{max-width:260px}}
</style>
</head>
<body>
<div class="toast" id="toast"></div>
<div class="screen" id="screen-onboard">
  <div class="onboard-logo">🦉</div>
  <h1 class="onboard-title">Welcome to<br><em>Kairos!</em></h1>
  <p class="onboard-sub">Enter your private Kairos username code. No phone number needed, and each code keeps its own progress.</p>
  <div class="name-input-wrap">
    <label for="usernameInput">Username code</label>
    <input class="name-input" id="usernameInput" type="text" placeholder="Example: kairos-7k29" maxlength="32" autocomplete="username">
    <label for="nameInput">Learner name</label>
    <input class="name-input" id="nameInput" type="text" placeholder="First name..." maxlength="24" autocomplete="off">
  </div>
  <button class="btn btn-green btn-lg" id="startBtn" onclick="startJourney()">Start Learning</button>
</div>
<div class="screen" id="screen-map">
  <div class="map-header">
    <div class="map-logo">Kairos</div>
    <div class="map-actions">
      <button class="xp-badge" onclick="switchLearner()">Switch</button>
      <div class="streak-badge">🔥 <span id="streakNum">0</span></div>
      <div class="xp-badge">⭐ <span id="xpNum">0</span> XP</div>
    </div>
  </div>
  <div class="map-body" id="mapBody"></div>
</div>
<div class="screen" id="screen-lesson">
  <div class="lesson-topbar">
    <button class="back-btn" onclick="goToMap()" title="Back to map">×</button>
    <div class="progress-bar-outer"><div class="progress-bar-inner" id="progressBar" style="width:0%"></div></div>
    <div class="hearts" id="heartsDisplay"></div>
  </div>
  <div class="lesson-body" id="lessonBody"></div>
</div>
<div class="screen" id="screen-summary">
  <div class="summary-trophy" id="summaryTrophy">🏆</div>
  <div class="summary-title" id="summaryTitle">Lesson Complete!</div>
  <div class="summary-sub" id="summarySub"></div>
  <div class="summary-stats" id="summaryStats"></div>
  <div class="summary-btns">
    <button class="btn btn-green btn-lg" onclick="goToMap()">Continue</button>
    <button class="btn btn-outline btn-lg" onclick="downloadSummary()">Export Summary JSON</button>
  </div>
</div>
<div class="theme-switcher">
  <button type="button" data-theme-choice="warm" onclick="setTheme('warm')" title="Warm">☀️</button>
  <button type="button" data-theme-choice="ink" onclick="setTheme('ink')" title="Ink">✒️</button>
  <button type="button" data-theme-choice="neon" onclick="setTheme('neon')" title="Neon">⚡</button>
</div>
<script>
const UNIT_SPECS=[
["Counting to 1000","🔢","Count by 1s, 5s, and 10s; count forward and backward; find missing numbers.",[
["Counting by 1s",[["teach","Counting by 1s","Each number goes up by one.","247, 248, 249, 250"],["q","What comes after 348?",["347","349","358"],"349"],["teach","Counting forward","Forward numbers get bigger.","798, 799, 800"],["q","Count forward: 799, 800, ___",["801","790","899"],"801"]],[["What comes after 999?",["990","1000","1001"],"1000"],["Which pattern counts by 1s?",["101, 102, 103","101, 106, 111","101, 111, 121"],"101, 102, 103"],["Fill in: 777, 778, ___",["779","780","778"],"779"],["What comes before 500?",["499","501","490"],"499"],["What comes after 649?",["650","648","659"],"650"]]],
["Counting by 5s and 10s",[["teach","Counting by 5s","Each number goes up by five.","25, 30, 35, 40"],["q","Count by 5s: 45, 50, ___",["51","55","60"],"55"],["teach","Counting by 10s","Each number goes up by ten.","120, 130, 140, 150"],["q","Count by 10s: 660, 670, ___",["675","680","690"],"680"]],[["Count by 5s: 80, 85, ___",["90","95","100"],"90"],["Count by 10s: 230, 240, ___",["245","250","260"],"250"],["Which counts by 10s?",["400, 405, 410","400, 410, 420","400, 401, 402"],"400, 410, 420"],["Count by 5s: 45, 50, ___",["55","60","65"],"55"],["Count by 10s: 970, 980, 990, ___",["995","1000","1010"],"1000"]]],
["Counting Forward and Backward",[["teach","Counting forward","Counting forward means numbers get bigger.","496, 497, 498, 499"],["q","Count forward: 498, 499, ___",["500","501","490"],"500"],["teach","Counting backward","Counting backward means numbers get smaller.","503, 502, 501, 500"],["q","Count backward: 301, 300, ___",["299","302","290"],"299"]],[["Count backward by 5s: 100, 95, ___",["90","85","105"],"90"],["Which pattern counts backward?",["42, 43, 44","42, 41, 40","42, 52, 62"],"42, 41, 40"],["Count backward by 10s: 900, 890, ___",["880","885","900"],"880"],["Count forward by 10s: 760, 770, ___",["775","780","790"],"780"],["What comes before 700?",["699","701","690"],"699"]]],
["Place Value Introduction",[["teach","Hundreds","The first digit in a 3-digit number shows hundreds.","In 345, the 3 means 3 hundreds."],["q","In 628, what digit is in the hundreds place?",["6","2","8"],"6"],["teach","Tens and ones","The middle digit shows tens. The last digit shows ones.","In 628, 2 is tens and 8 is ones."],["q","In 628, what digit is in the ones place?",["6","2","8"],"8"]],[["In 472, what digit is in the hundreds place?",["4","7","2"],"4"],["In 472, what digit is in the tens place?",["4","7","2"],"7"],["In 472, what digit is in the ones place?",["4","7","2"],"2"],["Which number has 9 in the hundreds place?",["195","519","951"],"951"],["Which number has 0 in the tens place?",["507","570","750"],"507"]]],
["Missing Numbers Review",[["teach","Find the pattern","Missing-number problems have a blank. First find the counting pattern.","10, 20, ___, 40 counts by 10s."],["q","Find the missing number: 10, 20, ___, 40",["25","30","35"],"30"],["teach","Use the rule","Add or subtract the same amount each step.","35, 40, 45, 50"],["q","Find the missing number: 35, 40, ___, 50",["45","55","60"],"45"]],[["Fill in: 120, 130, ___",["135","140","150"],"140"],["Fill in: 75, 80, ___",["81","85","90"],"85"],["Fill in: 499, ___, 501",["400","500","502"],"500"],["Fill in: 650, 640, ___",["630","635","660"],"630"],["Fill in: 985, 990, 995, ___",["996","1000","1005"],"1000"]]]]],
["Place Value (Hundreds)","🧱","Hundreds, tens, ones, expanded form, and comparing numbers.",[
["Hundreds, Tens, Ones",[["teach","Place Value","Every digit has a place. Hundreds, tens, ones.","In 342: 3 hundreds, 4 tens, 2 ones."],["q","In 523, how many hundreds?",["3","5","2"],"5"],["teach","Reading numbers","Read left to right: hundreds first, then tens, then ones.","472 = four hundred seventy-two"],["q","In 709, how many tens?",["7","0","9"],"0"]],[["In 831, what digit is in the tens place?",["8","3","1"],"3"],["In 260, how many ones?",["2","6","0"],"0"],["Which digit is in the hundreds place of 547?",["5","4","7"],"5"],["In 999, how many hundreds?",["9","8","7"],"9"],["In 104, how many tens?",["1","0","4"],"0"]]],
["Build Numbers with Blocks",[["teach","Base Ten Blocks","Use blocks: big cube=100, rod=10, small cube=1.","3 big + 2 rods + 5 small = 325"],["q","3 hundreds + 4 tens + 1 one = ?",["341","314","431"],"341"],["teach","Trade blocks","10 ones = 1 ten. 10 tens = 1 hundred.","10 rods = 1 big cube"],["q","2 hundreds + 0 tens + 7 ones = ?",["270","207","720"],"207"]],[["4 hundreds + 5 tens + 3 ones = ?",["453","435","543"],"453"],["1 hundred + 2 tens + 8 ones = ?",["128","182","218"],"128"],["6 hundreds + 0 tens + 0 ones = ?",["600","060","006"],"600"],["3 hundreds + 3 tens + 3 ones = ?",["333","303","330"],"333"],["5 hundreds + 1 ten + 9 ones = ?",["519","591","915"],"519"]]],

["Hour",[["teach","Telling time to the hour","The short hand shows the hour. The minute hand points to 12 for the hour.","When both hands line up at 3 and 12, it is 3:00"],["q","The hour hand points to 5. The minute hand points to 12. What time is it?",["4:00","5:00","6:00"],"5:00"],["teach","Writing time","Write the hour, then colon, then 00 for the hour.","Three o'clock = 3:00"],["q","It is seven o'clock. How do you write it?",["7:30","7:00","0:07"],"7:00"]],[["Hour hand on 2, minute on 12. Time?",["1:00","2:00","3:00"],"2:00"],["What does 9:00 mean?",["9 minutes","9 hours","9 o'clock"],"9 o'clock"],["If it is 4:00, what time will it be in 1 hour?",["3:00","5:00","4:30"],"5:00"],["Hour hand between 6 and 7, minute on 12. Time is closest to?",["6:00","7:00","6:30"],"6:00"],["What time is 'noon'?",["11:00","12:00","1:00"],"12:00"]]],
["Half Hour",[["teach","Half Past","When the minute hand points to 6, it is half past the hour.","2:30 = half past two"],["q","Hour hand between 3 and 4. Minute hand on 6. What time?",["3:00","3:30","4:00"],"3:30"],["teach","30 minutes","Half an hour = 30 minutes. After 30 minutes, the minute hand moves from 12 to 6.","1:00 → 30 min later → 1:30"],["q","It is 6:00. What time will it be in 30 minutes?",["6:00","6:30","7:00"],"6:30"]],[["7:30 means ___ past seven",["half","quarter","whole"],"half"],["Hour hand near 10, minute on 6. Time?",["9:30","10:30","11:30"],"10:30"],["If it is 4:30, what time was it 30 minutes ago?",["3:30","4:00","5:00"],"4:00"],["Half past 8 = ?",["7:30","8:00","8:30"],"8:30"],["Minute hand on 6 means ___ minutes",["15","30","45"],"30"]]],
["Daily Schedule",[["teach","Daily Schedule","A schedule helps you plan your day using time.","8:00 wake up, 8:30 breakfast..."],["q","School starts at 8:00. Lunch is at 12:00. How many hours between?",["3","4","5"],"4"],["teach","Reading a schedule","Look at the times in order to plan your day.","Morning → afternoon → evening"],["q","Bedtime is at 8:00 PM. Dinner is at 6:00 PM. How many hours between?",["1","2","3"],"2"]],[["Breakfast at 7:00. School at 8:00. How long between?",["30 min","1 hour","2 hours"],"1 hour"],["Recess at 10:00. Lunch at 12:00. How many hours?",["1","2","3"],"2"],["If school ends at 3:00 and started at 8:00, how many hours?",["4","5","6"],"5"],["What comes before noon?",["morning","evening","night"],"morning"],["PM means?",["after noon","before noon","midnight"],"after noon"]]],
["Word Problems",[["teach","Time Word Problems","Use addition or subtraction to solve time problems.","If it is 2:00 and you wait 3 hours, it will be 5:00"],["q","It is 3:00. You wait 2 hours. What time is it now?",["4:00","5:00","6:00"],"5:00"],["teach","Elapsed time","Elapsed time = how much time has passed.","Started 9:00, ended 11:00 → 2 hours elapsed"],["q","A movie starts at 1:00 and ends at 3:00. How long is it?",["1 hour","2 hours","3 hours"],"2 hours"]],[["School starts 8:00, ends 3:00. How many hours?",["6","7","8"],"7"],["It is 9:00 AM. 4 hours later it is?",["12:00","1:00 PM","2:00 PM"],"1:00 PM"],["Practice from 4:30 to 6:30. How long?",["1 hour","2 hours","3 hours"],"2 hours"],["If you sleep at 8:00 PM and wake at 6:00 AM, how many hours did you sleep?",["8","9","10"],"10"],["Baking takes 30 min. Started at 2:00. Done at?",["2:00","2:30","3:00"],"2:30"]]],

["Money Basics","💵","Coins, counting coins, change, and money stories.",[

["Missing Patterns",[["teach","Missing Patterns","Find the missing piece using the pattern rule.","3, ___, 9: rule is +3, so missing = 6"],["q","3, ___, 9 What is missing?",["5","6","7"],"6"],["teach","Check both sides","Use the numbers on both sides of the blank to figure out the rule.","___, 10, 15: goes up by 5, so blank = 5"],["q","___, 10, 15 What is missing?",["3","5","7"],"5"]],[["5, ___, 15 Missing?",["8","10","12"],"10"],["20, ___, 10 Missing?",["12","13","15"],"15"],["2, 4, ___, 8 Missing?",["5","6","7"],"6"],["___, 9, 12 Missing?",["4","5","6"],"6"],["10, 20, ___, 40 Missing?",["25","30","35"],"30"]]],

["Addition with Carrying","🧮","Regroup ones into tens and solve addition stories.",[
["Regrouping",[["teach","Regrouping Ones","When you have 10 or more ones, regroup! 10 ones = 1 ten.","15 ones → 1 ten + 5 ones"],["q","14 ones = ___ ten and ___ ones",["1 ten, 4 ones","4 tens, 1 one","10 tens, 4 ones"],"1 ten, 4 ones"],["teach","Why we carry","In addition, if ones column is ≥ 10, carry 1 to the tens.","7 + 6 = 13: write 3, carry 1 ten"],["q","7 + 6 = 13. Write ___ in ones, carry ___ to tens",["3, 1","1, 3","3, 0"],"3, 1"]],[["17 ones = ___ ten ___ ones",["1, 7","7, 1","0, 17"],"1, 7"],["8 + 5 = 13. What do we carry?",["0","1","2"],"1"],["9 + 4 = ?",["12","13","14"],"13"],["6 + 7 = ?",["12","13","14"],"13"],["8 + 8 = ?",["14","15","16"],"16"]]],

["Step-by-step",[["teach","Step by Step","Step 1: Can you subtract ones? If not, borrow. Step 2: Subtract ones. Step 3: Subtract tens.","  72 - 38: 2<8, borrow → 12-8=4, 6-3=3 → 34"],["q","72 - 38 = ?",["34","44","54"],"34"],["teach","Practice the steps","  64 - 29: 4<9, borrow → 14-9=5, 5-2=3 → 35","Write it out step by step!"],["q","64 - 29 = ?",["35","45","55"],"35"]],[["81 - 46 = ?",["35","45","55"],"35"],["93 - 57 = ?",["36","46","56"],"36"],["75 - 38 = ?",["37","47","57"],"37"],["62 - 25 = ?",["37","47","57"],"37"],["84 - 49 = ?",["35","45","55"],"35"]]],

["Fractions Intro","🍰","Halves, fourths, equal parts, and real-life sharing.",[
["Halves",[["teach","Halves","A half is 1 of 2 equal parts. Write it as 1/2.","Cut a sandwich in half: 2 equal pieces"],["q","A circle is split into 2 equal parts. Each part is ___",["a quarter","a half","a third"],"a half"],["teach","Equal is key","Both halves must be the same size!","Unequal pieces are NOT halves"],["q","Which makes true halves?",["2 equal parts","2 unequal parts","3 equal parts"],"2 equal parts"]],[["1/2 means ___ of ___ equal parts",["1 of 2","2 of 1","1 of 3"],"1 of 2"],["A pizza cut into 2 equal parts. You eat 1. You ate ___",["1/4","1/2","1/3"],"1/2"],["Half of 8 = ?",["2","4","6"],"4"],["Half of 10 = ?",["4","5","6"],"5"],["Are 2 unequal pieces halves?",["yes","no","sometimes"],"no"]]],
["Fourths",[["teach","Fourths (Quarters)","A fourth is 1 of 4 equal parts. Write it as 1/4.","Cut a square into 4 equal pieces: each is 1/4"],["q","A square cut into 4 equal parts. Each part is ___",["1/2","1/3","1/4"],"1/4"],["teach","Quarters","4 fourths make a whole. 1/4 + 1/4 + 1/4 + 1/4 = 1 whole.","Like 4 quarters make one dollar!"],["q","How many fourths make a whole?",["2","3","4"],"4"]],[["1/4 means ___ of ___ equal parts",["1 of 4","4 of 1","2 of 4"],"1 of 4"],["A pie cut into 4. You eat 1 piece. You ate ___",["1/2","1/4","1/3"],"1/4"],["Quarter of 8 = ?",["1","2","3"],"2"],["Quarter of 12 = ?",["2","3","4"],"3"],["Are 4 unequal pieces fourths?",["yes","no","sometimes"],"no"]]],
["Equal Parts",[["teach","Equal Parts","Fractions need EQUAL parts. If parts are unequal, we can't name the fraction.","Always check: are all parts the same size?"],["q","A shape cut into equal parts can be called ___",["a fraction","a whole","a mistake"],"a fraction"],["teach","How to check","Fold or compare: do all pieces match?","Like puzzle pieces that fit exactly together"],["q","A rectangle split into 3 equal parts. Each is ___",["1/4","1/3","1/2"],"1/3"]],[["Which is NOT equal parts?",["pizza cut equally","cake cut equally","pie cut unevenly"],"pie cut unevenly"],["A circle split into equal parts with 2 parts shaded of 4. Shaded = ___",["1/2","1/4","2/4"],"2/4"],["True or false: 1/4 needs 4 equal parts?",["true","false","maybe"],"true"],["A shape has 3 equal parts. 1 is shaded. Shaded = ___",["1/4","1/3","1/2"],"1/3"],["Which fraction needs 2 equal parts?",["1/4","1/2","1/3"],"1/2"]]],
["Real Life",[["teach","Fractions in Real Life","We share food, time, and objects using fractions every day!","Sharing a cookie equally with a friend = 1/2 each"],["q","You share a sandwich equally with 1 friend. Each gets ___",["1/4","1/2","1/3"],"1/2"],["teach","More real-life fractions","A quarter hour = 1/4 of an hour = 15 minutes.","Half a dollar = 50 cents"],["q","Half of a dollar = ___ cents",["25","50","75"],"50"]],[["Share pizza equally with 3 friends (4 people total). Each gets ___",["1/2","1/3","1/4"],"1/4"],["Half hour = ___ minutes",["20","30","45"],"30"],["A quarter of 100 = ?",["20","25","30"],"25"],["If you split 12 grapes equally with a friend, each gets ___",["4","6","8"],"6"],["Half of 20 = ?",["8","10","12"],"10"]]],
["Review",[["teach","Fractions Review","Halves, fourths, equal parts, and real-life sharing — fraction master!","Final check!"],["q","1/2 means ___ of 2 equal parts",["1","2","0"],"1"],["teach","Key fractions","1/2 = half. 1/4 = quarter. Both need equal parts!","Equal parts are essential for fractions"],["q","Quarter of 8 = ?",["1","2","3"],"2"]],[["A sandwich cut into 2 equal parts. Each part = ___",["1/4","1/2","1/3"],"1/2"],["How many fourths in a whole?",["2","3","4"],"4"],["Half of 14 = ?",["6","7","8"],"7"],["A shape has 4 equal parts. 3 shaded. Shaded = ___",["1/4","2/4","3/4"],"3/4"],["Which needs 4 equal parts?",["1/2","1/3","1/4"],"1/4"]]]

// ─────────────────────────────────────────────────────────────
//  Lesson icons per unit
// ─────────────────────────────────────────────────────────────
const LESSON_ICONS=["📖","✏️","🧩","⚡","🏆"];

// ─────────────────────────────────────────────────────────────
//  Storage helpers (per username key)
// ─────────────────────────────────────────────────────────────
let STATE={username:"",name:"",xp:0,streak:0,lastDate:"",progress:{}};
function storageKey(){return"kairos_v2_"+STATE.username}
function saveState(){localStorage.setItem(storageKey(),JSON.stringify(STATE))}
function loadState(username){
  const raw=localStorage.getItem("kairos_v2_"+username);
  if(raw){STATE=JSON.parse(raw);STATE.username=username;}
  else{STATE={username,name:"",xp:0,streak:0,lastDate:"",progress:{}};}
}

// ─────────────────────────────────────────────────────────────
//  Streak logic
// ─────────────────────────────────────────────────────────────
function updateStreak(){
  const today=new Date().toDateString();
  if(STATE.lastDate===today)return;
  const yesterday=new Date(Date.now()-86400000).toDateString();
  STATE.streak=STATE.lastDate===yesterday?STATE.streak+1:1;
  STATE.lastDate=today;
  saveState();
}

// ─────────────────────────────────────────────────────────────
//  Onboard
// ─────────────────────────────────────────────────────────────
function startJourney(){
  const username=document.getElementById("usernameInput").value.trim();
  const name=document.getElementById("nameInput").value.trim();
  if(!username||!name){showToast("Please fill in both fields!");return;}
  loadState(username);
  if(!STATE.name)STATE.name=name;
  updateStreak();
  saveState();
  renderMap();
  showScreen("map");
}
function switchLearner(){showScreen("onboard")}

// ─────────────────────────────────────────────────────────────
//  Map rendering
// ─────────────────────────────────────────────────────────────
let currentUnit=0;
function renderMap(){
  document.getElementById("streakNum").textContent=STATE.streak;
  document.getElementById("xpNum").textContent=STATE.xp;
  const body=document.getElementById("mapBody");
  const unit=UNIT_SPECS[currentUnit];
  const unitName=unit[0],unitEmoji=unit[1],unitDesc=unit[2],lessons=unit[3];

  // Build unit pills
  let pills='<div class="unit-picker">';
  UNIT_SPECS.forEach((_,i)=>{
    const done=isUnitUnlocked(i);
    const active=i===currentUnit?"active":"";
    const locked=done||i===0?"":i<=getHighestUnlockedUnit()+1?"":"locked";
    pills+=`<button class="unit-pill ${active} ${locked}" onclick="selectUnit(${i})">${i+1}</button>`;
  });
  pills+='</div>';

  // Unit header
  const headerHtml=`<div class="profile-header">
    <div class="avatar">${unitEmoji}</div>
    <div class="profile-text"><h2>${STATE.name}</h2><p>⭐ ${STATE.xp} XP · 🔥 ${STATE.streak} day streak</p></div>
  </div>
  ${pills}
  <div class="unit-header-card">
    <h2>Unit ${currentUnit+1}: ${unitName}</h2>
    <p>${unitDesc}</p>
  </div>
  <div class="lesson-list">`;

  let lessonCards="";
  lessons.forEach((lesson,li)=>{
    const lessonId=`u${currentUnit}l${li}`;
    const prog=STATE.progress[lessonId]||{learn:false,quiz:false};
    const isFirst=li===0;
    const prevDone=li===0||((STATE.progress[`u${currentUnit}l${li-1}`]||{}).quiz);
    const locked=!isFirst&&!prevDone;
    const icon=LESSON_ICONS[li%LESSON_ICONS.length];
    const lessonTitle=Array.isArray(lesson)?lesson[0]:lesson;
    const subtitle=prog.quiz?"Complete ✓":prog.learn?"Quiz ready":"Start lesson";
    lessonCards+=`<button class="lesson-card ${locked?"locked":""} ${prog.learn&&!prog.quiz?"active":""}"
      onclick="${locked?"":""}" ${locked?`disabled`:`onclick="startLesson(${currentUnit},${li})"`}>
      <div class="lesson-fill">
        <span class="${prog.learn?"learn-done":""}"></span>
        <span class="${prog.quiz?"quiz-done":""}"></span>
      </div>
      <div class="lesson-icon">${icon}</div>
      <div class="lesson-copy"><h3>${lessonTitle}</h3><p>${subtitle}</p></div>
    </button>`;
  });

  body.innerHTML=headerHtml+lessonCards+"</div>";
}

function selectUnit(i){
  const max=getHighestUnlockedUnit();
  if(i>max+1&&i!==0){showToast("Complete previous units first!");return;}
  currentUnit=i;renderMap();
}

function getHighestUnlockedUnit(){
  let h=0;
  UNIT_SPECS.forEach((_,i)=>{if(isUnitUnlocked(i))h=i;});
  return h;
}
function isUnitUnlocked(ui){
  const lessons=UNIT_SPECS[ui][3];
  return lessons.every((_,li)=>(STATE.progress[`u${ui}l${li}`]||{}).quiz);
}

// ─────────────────────────────────────────────────────────────
//  Lesson engine
// ─────────────────────────────────────────────────────────────
let currentLesson={unitIdx:0,lessonIdx:0,steps:[],stepIdx:0,hearts:3,xpEarned:0,mistakes:0,quizResults:[]};

function startLesson(ui,li){
  const lesson=UNIT_SPECS[ui][3][li];
  const lessonTitle=Array.isArray(lesson)?lesson[0]:lesson;
  const learnSteps=Array.isArray(lesson)&&lesson[1]?lesson[1]:[];
  const quizSteps=Array.isArray(lesson)&&lesson[2]?lesson[2]:[];

  // Build step sequence: learn cards first, then quiz questions
  const steps=[];
  learnSteps.forEach(s=>{
    if(s[0]==="teach") steps.push({type:"teach",title:s[1],body:s[2],example:s[3]});
    else if(s[0]==="q") steps.push({type:"q",prompt:s[1],choices:s[2],answer:s[3]});
  });
  quizSteps.forEach(s=>{
    if(Array.isArray(s)&&s.length>=3) steps.push({type:"q",prompt:s[0],choices:s[1],answer:s[2]});
  });

  currentLesson={unitIdx:ui,lessonIdx:li,steps,stepIdx:0,hearts:3,xpEarned:0,mistakes:0,quizResults:[],lessonTitle};
  showScreen("lesson");
  renderStep();
}

function renderStep(){
  const {steps,stepIdx,hearts}=currentLesson;
  const total=steps.length;
  const pct=Math.round((stepIdx/Math.max(total,1))*100);
  document.getElementById("progressBar").style.width=pct+"%";

  // Hearts
  let hHtml="";
  for(let i=0;i<3;i++) hHtml+=`<span class="heart ${i>=hearts?"lost":""}">❤️</span>`;
  document.getElementById("heartsDisplay").innerHTML=hHtml;

  if(stepIdx>=total){finishLesson();return;}

  const step=steps[stepIdx];
  const body=document.getElementById("lessonBody");

  if(step.type==="teach"){
    body.innerHTML=`
      <div class="q-type-label">Learn</div>
      <div class="q-emoji">📖</div>
      <div class="teach-box">
        <h3>${step.title}</h3>
        <p>${step.body}</p>
        ${step.example?`<div class="example-box">Example: ${step.example}</div>`:""}
      </div>
      <div class="action-row">
        <button class="btn btn-green" onclick="nextStep()">Got it! →</button>
      </div>`;
  } else if(step.type==="q"){
    const keys=["A","B","C","D"];
    let choicesHtml=step.choices.map((c,i)=>`
      <button class="choice-btn" id="choice${i}" onclick="checkAnswer('${c.replace(/'/g,"\\'")}', this)">
        <span class="choice-key">${keys[i]}</span>${c}
      </button>`).join("");
    body.innerHTML=`
      <div class="q-type-label">Question ${stepIdx+1} of ${total}</div>
      <div class="q-text">${step.prompt}</div>
      <div class="choices">${choicesHtml}</div>
      <div id="feedbackArea"></div>
      <div class="action-row" id="actionRow" style="display:none">
        <button class="btn btn-green" onclick="nextStep()">Continue →</button>
      </div>`;
  }
}

function checkAnswer(selected, btn){
  const step=currentLesson.steps[currentLesson.stepIdx];
  if(!step||step.type!=="q")return;
  // Disable all buttons
  document.querySelectorAll(".choice-btn").forEach(b=>b.classList.add("disabled") && (b.onclick=null));
  document.querySelectorAll(".choice-btn").forEach(b=>{b.style.pointerEvents="none";});

  const correct=selected===step.answer;
  const fb=document.getElementById("feedbackArea");
  const ar=document.getElementById("actionRow");

  if(correct){
    btn.classList.add("correct");
    currentLesson.xpEarned+=10;
    currentLesson.quizResults.push({prompt:step.prompt,answer:step.answer,correct:true});
    fb.innerHTML=`<div class="feedback-banner correct"><span class="fb-icon">✅</span><div><div class="fb-title">Correct!</div><div class="fb-body">Great job! The answer is ${step.answer}.</div></div></div>`;
  } else {
    btn.classList.add("wrong");
    currentLesson.hearts=Math.max(0,currentLesson.hearts-1);
    currentLesson.mistakes++;
    currentLesson.quizResults.push({prompt:step.prompt,answer:step.answer,given:selected,correct:false});
    // Highlight correct answer
    document.querySelectorAll(".choice-btn").forEach(b=>{
      if(b.textContent.trim().includes(step.answer))b.classList.add("correct");
    });
    fb.innerHTML=`<div class="feedback-banner wrong"><span class="fb-icon">❌</span><div><div class="fb-title">Not quite!</div><div class="fb-body">The correct answer is <strong>${step.answer}</strong>.</div></div></div>`;
    // Update hearts display
    let hHtml="";
    for(let i=0;i<3;i++) hHtml+=`<span class="heart ${i>=currentLesson.hearts?"lost":""}">❤️</span>`;
    document.getElementById("heartsDisplay").innerHTML=hHtml;
  }
  ar.style.display="flex";
}

function nextStep(){
  currentLesson.stepIdx++;
  renderStep();
}

function finishLesson(){
  const {unitIdx,lessonIdx,xpEarned,mistakes,quizResults,lessonTitle}=currentLesson;
  const lessonId=`u${unitIdx}l${lessonIdx}`;
  const prog=STATE.progress[lessonId]||{};
  // Mark learn and quiz as done
  STATE.progress[lessonId]={learn:true,quiz:true};
  STATE.xp+=xpEarned;
  updateStreak();
  saveState();

  // Summary screen
  const accuracy=quizResults.length>0?Math.round((quizResults.filter(r=>r.correct).length/quizResults.length)*100):100;
  const trophy=accuracy>=90?"🏆":accuracy>=70?"🥈":"🥉";
  document.getElementById("summaryTrophy").textContent=trophy;
  document.getElementById("summaryTitle").textContent=accuracy>=90?"Lesson Complete! 🎉":accuracy>=70?"Good Work! 👍":"Keep Practicing! 💪";
  document.getElementById("summarySub").textContent=`"${lessonTitle}" — Unit ${unitIdx+1}`;
  document.getElementById("summaryStats").innerHTML=`
    <div class="summary-stat"><div class="summary-stat-num">${xpEarned}</div><div class="summary-stat-label">XP Earned</div></div>
    <div class="summary-stat"><div class="summary-stat-num">${accuracy}%</div><div class="summary-stat-label">Accuracy</div></div>
    <div class="summary-stat"><div class="summary-stat-num">${mistakes}</div><div class="summary-stat-label">Mistakes</div></div>
    <div class="summary-stat"><div class="summary-stat-num">🔥${STATE.streak}</div><div class="summary-stat-label">Day Streak</div></div>`;
  showScreen("summary");
}

function downloadSummary(){
  const {unitIdx,lessonIdx,xpEarned,mistakes,quizResults,lessonTitle}=currentLesson;
  const data={learner:STATE.name,lesson:lessonTitle,unit:unitIdx+1,xpEarned,mistakes,quizResults,timestamp:new Date().toISOString()};
  const blob=new Blob([JSON.stringify(data,null,2)],{type:"application/json"});
  const a=document.createElement("a");a.href=URL.createObjectURL(blob);a.download="kairos-summary.json";a.click();
}

// ─────────────────────────────────────────────────────────────
//  Navigation
// ─────────────────────────────────────────────────────────────
function showScreen(id){
  document.querySelectorAll(".screen").forEach(s=>s.classList.remove("active"));
  document.getElementById("screen-"+id).classList.add("active");
  if(id==="map")renderMap();
}
function goToMap(){showScreen("map");}

// ─────────────────────────────────────────────────────────────
//  Theme
// ─────────────────────────────────────────────────────────────
function setTheme(t){
  document.body.dataset.theme=t==="warm"?"":t;
  document.querySelectorAll("[data-theme-choice]").forEach(b=>b.classList.toggle("active-theme",b.dataset.themeChoice===t));
  localStorage.setItem("kairos_theme",t);
}
(function(){
  const t=localStorage.getItem("kairos_theme")||"warm";
  setTheme(t);
})();

// ─────────────────────────────────────────────────────────────
//  Toast
// ─────────────────────────────────────────────────────────────
let toastTimer;
function showToast(msg){
