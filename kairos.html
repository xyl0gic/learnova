function renderMap(){document.getElementById("streakNum").textContent=state.streak||0;document.getElementById("xpNum").textContent=state.xp||0;if(!progress)loadProgress();const body=document.getElementById("mapBody");body.innerHTML=`<div class="profile-header"><div class="avatar" id="avatar">ðŸ¦Š</div><div class="profile-text"><h2 id="welcomeText">Welcome</h2><p>Kairos Learning Path</p></div></div>`;loadProfile();CURRICULUM.units.forEach((unit,ui)=>{const uh=document.createElement("div");uh.className="unit-header-card";uh.style.background=ui%2?"var(--secondary)":"var(--primary)";uh.style.boxShadow=`0 6px 0 ${ui%2?"var(--secondary-dark)":"var(--primary-dark)"}`;uh.innerHTML=`<h2>Unit ${ui+1}: ${unit.title}</h2><p>${unit.description}</p>`;body.appendChild(uh);const path=document.createElement("div");path.className="map-path";unit.lessons.forEach((lesson,li)=>{const done=!!state.completedLessons[lesson.id]||progress.scores[lesson.id]!==undefined;const unlocked=lessonUnlockedFor(unit.id,li);if(li>0){const conn=document.createElement("div");conn.className="map-connector "+(progress.scores[unit.lessons[li-1].id]!==undefined?"mc-done":"mc-locked");path.appendChild(conn)}const wrap=document.createElement("div");wrap.className="map-node-wrap";const node=document.createElement("button");node.className=`map-node ${done?"node-done":unlocked?"node-active":"node-locked"}`;node.textContent=done?"âœ“":unlocked?lesson.emoji:"ðŸ”’";if(!unlocked)node.classList.add("locked");if(unlocked)node.onclick=()=>startLesson(unit.id,lesson.id);const label=document.createElement("div");label.className="node-label";label.style.color=done?"var(--primary)":unlocked?"var(--secondary)":"var(--ink-muted)";label.textContent=lesson.title;wrap.append(node,label);path.appendChild(wrap)});body.appendChild(path);if(allUnitLessonsDone(ui)){const banner=document.createElement("div");banner.className="unit-complete-banner";banner.innerHTML=`<h3>ðŸŽ‰ Unit ${ui+1} Complete!</h3><p>You mastered all lessons in this function allUnitLessonsDone(ui){if(ui<0)return true;const unit=CURRICULUM.units[ui];return unit&&unit.lessons.every(l=>!!state.completedLessons[l.id])}function darken(hex){let r=parseInt(hex.slice(1,3),16),g=parseInt(hex.slice(3,5),16),b=parseInt(hex.slice(5,7),16);return`rgb(${Math.max(0,r-40)},${Math.max(0,g-40)},${Math.max(0,b-40)})`}
function startLesson(unitId,lessonId){const unit=CURRICULUM.units.find(u=>u.id===unitId);const lesson=unit.lessons.find(l=>l.id===lessonId);session={unitId,lessonId,qIndex:0,attempts:0,hearts:3,results:[],answered:false,selectedChoice:null};showScreen("lesson");renderQuestion(lesson)}function getLessonData(){const unit=CURRICULUM.units.find(u=>u.id===session.unitId);return unit.lessons.find(l=>l.id===session.lessonId)}function goToMap(){showScreen("map");renderMap()}function renderHearts(){const el=document.getElementById("heartsDisplay");el.innerHTML="";for(let i=0;i<3;i++){const h=document.createElement("span");h.className="heart"+(i>=session.hearts?" lost":"");h.textContent="â¤ï¸";el.appendChild(h)}}
function renderQuestion(lesson){const q=lesson.questions[session.qIndex],total=lesson.questions.length;document.getElementById("progressBar").style.width=(session.qIndex/total)*100+"%";renderHearts();session.answered=false;session.selectedChoice=null;session.attempts=0;const body=document.getElementById("lessonBody");body.innerHTML="";const typeLabel=document.createElement("div");typeLabel.className="q-type-label";typeLabel.textContent=q.type==="mcq"?"Choose the correct answer":"Type your answer";body.appendChild(typeLabel);if(q.emoji){const em=document.createElement("div");em.className="q-emoji";em.textContent=q.emoji;body.appendChild(em)}const qt=document.createElement("div");qt.className="q-text";qt.textContent=q.text;body.appendChild(qt);const attRow=document.createElement("div");attRow.className="attempts-row";attRow.id="attemptsRow";for(let i=0;i<3;i++){const d=document.createElement("div");d.className="attempt-dot remaining";attRow.appendChild(d)}body.appendChild(attRow);const fb=document.createElement("div");fb.id="feedbackArea";body.appendChild(fb);q.type==="mcq"?renderMCQ(q,body):renderTyped(q,body)}
function renderMCQ(q,body){const wrap=document.createElement("div");wrap.className="choices";const keys=["A","B","C","D"];q.choices.forEach((c,i)=>{const btn=document.createElement("button");btn.className="choice-btn";btn.innerHTML=`<span class="choice-key">${keys[i]}</span>${c}`;btn.onclick=()=>selectChoice(i);wrap.appendChild(btn)});body.appendChild(wrap);const ar=document.createElement("div");ar.className="action-row";ar.id="actionRow";const checkBtn=document.createElement("button");checkBtn.className="btn btn-green btn-disabled";checkBtn.id="checkBtn";checkBtn.textContent="Check âœ“";checkBtn.onclick=()=>submitMCQ(q);ar.appendChild(checkBtn);body.appendChild(ar)}
function selectChoice(idx){if(session.answered)return;session.selectedChoice=idx;document.querySelectorAll(".choice-btn").forEach((b,i)=>{b.classList.toggle("selected",i===idx)});document.getElementById("checkBtn").classList.remove("btn-disabled")}function renderTyped(q,body){const wrap=document.createElement("div");wrap.className="typed-wrap";wrap.innerHTML=`<input class="typed-input" id="typedInput" type="text" placeholder="Type your answer here..." autocomplete="off">`;body.appendChild(wrap);const ar=document.createElement("div");ar.className="action-row";ar.id="actionRow";const checkBtn=document.createElement("button");checkBtn.className="btn btn-blue";checkBtn.textContent="Check âœ“";checkBtn.onclick=()=>submitTyped(q);ar.appendChild(checkBtn);body.appendChild(ar);setTimeout(()=>document.getElementById("typedInput").focus(),50)}
function submitMCQ(q){if(session.answered||session.selectedChoice===null)return;const correct=session.selectedChoice===q.answer;handleAnswer(correct,q,String(session.selectedChoice));document.querySelectorAll(".choice-btn").forEach((b,i)=>{b.classList.add("disabled");b.onclick=null;if(i===q.answer)b.classList.add("correct");else if(i===session.selectedChoice&&!correct)b.classList.add("wrong")})}function submitTyped(q){if(session.answered)return;const inp=document.getElementById("typedInput");const val=inp.value.trim();if(!val){toast("Type something first! âœï¸");return}const correct=normalizeAnswer(val)===normalizeAnswer(q.answer);inp.classList.toggle("correct",correct);if(!correct){inp.classList.add("wrong");setTimeout(()=>inp.classList.remove("wrong"),400)}handleAnswer(correct,q,val);if(correct||session.attempts>=3)inp.disabled=true}
function handleAnswer(correct,q,given){session.attempts++;updateAttemptDots();if(correct){session.answered=true;session.results.push({correct:true,attempts:session.attempts,answerGiven:given,question:q.text,correctAnswer:String(q.answer)});showFeedback("correct","ðŸŽ‰ Correct!","");replaceCheckWithNext()}else if(session.attempts>=3){session.answered=true;session.hearts=Math.max(0,session.hearts-1);renderHearts();session.results.push({correct:false,attempts:session.attempts,answerGiven:given,question:q.text,correctAnswer:String(q.answer)});const correctText=q.type==="mcq"?q.choices[q.answer]:q.answer;showFeedback("maxed","ðŸ˜¬ Nice try!",`The correct answer was: <strong>${correctText}</strong>`);replaceCheckWithNext();if(q.type==="mcq")document.querySelectorAll(".choice-btn").forEach((b,i)=>{b.classList.add("disabled");b.onclick=null;if(i===q.answer)b.classList.add("correct")})}else{session.hearts=Math.max(0,session.hearts-1);renderHearts();showFeedback("wrong","Not quite! ðŸ¤”",q.hint?`Hint: ${q.hint}`:`Try again! ${3-session.attempts} left.`);if(q.type==="mcq"){session.selectedChoice=null;document.querySelectorAll(".choice-btn").forEach(b=>b.classList.remove("selected","wrong"));document.getElementById("checkBtn").classList.add("btn-disabled")}else{const inp=document.getElementById("typedInput");inp.disabled=false;inp.value="";inp.focus()}}}
function updateAttemptDots(){const dots=document.querySelectorAll("#attemptsRow .attempt-dot");dots.forEach((d,i)=>{d.className="attempt-dot "+(i<session.attempts?"used":"remaining")})}function showFeedback(type,title,body){document.getElementById("feedbackArea").innerHTML=`<div class="feedback-banner ${type}"><span class="fb-icon">${{correct:"âœ…",wrong:"âŒ",maxed:"ðŸ’¡"}[type]}</span><div><div class="fb-title">${title}</div><div class="fb-body">${body}</div></div></div>`}function replaceCheckWithNext(){const ar=document.getElementById("actionRow");const lesson=getLessonData();const isLast=session.qIndex>=lesson.questions.length-1;ar.innerHTML="";const nextBtn=document.createElement("button");nextBtn.className="btn btn-green";nextBtn.textContent=isLast?"Finish ðŸ":"Next â†’";nextBtn.onclick=isLast?finishLesson:nextQuestion;ar.appendChild(nextBtn)}function nextQuestion(){session.qIndex++;renderQuestion(getLessonData())}
function finishLesson(){const lesson=getLessonData();const unit=CURRICULUM.units.find(u=>u.id===session.unitId);const correct=session.results.filter(r=>r.correct).length,total=session.results.length,accuracy=Math.round((correct/total)*100),xpEarned=Math.round(lesson.xp*(accuracy/100)),date=new Date().toLocaleDateString();state.completedLessons[lesson.id]={score:correct,total,accuracy,xpEarned,date};state.xp=(state.xp||0)+xpEarned;if(!progress)loadProgress();progress.scores[lesson.id]=accuracy;progress.mood=getMood(accuracy);const li=unit.lessons.findIndex(l=>l.id===lesson.id);if(unit.id==="u1")progress.lessonUnlocked=Math.max(progress.lessonUnlocked,Math.min(unit.lessons.length,li+2));rebuildProgressMap();updateStreak();if(allUnitLessonsDone(CURRICULUM.units.indexOf(unit)))buildUnitSummary(unit);saveProgress();saveState();showSummaryScreen(lesson,unit,correct,total,accuracy,xpEarned)}
function buildUnitSummary(unit){const existing=state.summaries.findIndex(s=>s.unitId===unit.id);const summary={unitId:unit.id,unitTitle:unit.title,student:state.name,completedDate:new Date().toLocaleDateString(),lessons:unit.lessons.map(l=>{const r=state.completedLessons[l.id];return{lessonId:l.id,title:l.title,score:r?.score,total:r?.total,accuracy:r?.accuracy,xpEarned:r?.xpEarned,date:r?.date}}),totalXP:unit.lessons.reduce((a,l)=>a+(state.completedLessons[l.id]?.xpEarned||0),0),averageAccuracy:Math.round(unit.lessons.reduce((a,l)=>a+(state.completedLessons[l.id]?.accuracy||0),0)/unit.lessons.length)};existing>=0?state.summaries[existing]=summary:state.summaries.push(summary)}
function showSummaryScreen(lesson,unit,correct,total,accuracy,xpEarned){const mood=getMood(accuracy),moodCopy={excited:"You crushed it. Next lesson is ready!",happy:"Great work. Keep the streak going!",neutral:"Good effort. A little review will help.",coach:"No stress. Let's slow down and practice."};document.getElementById("summaryTrophy").textContent=mood==="excited"?"ðŸ†":mood==="happy"?"â­":mood==="neutral"?"ðŸ“˜":"ðŸ’¡";document.getElementById("summaryTitle").textContent=mood==="excited"?"Amazing Score!":mood==="happy"?"Great Work!":mood==="neutral"?"Lesson Done!":"Coach Mode";document.getElementById("summarySub").textContent=`${lesson.title} â€” ${moodCopy[mood]}`;document.getElementById("summaryStats").innerHTML=`<div class="summary-stat"><div class="summary-stat-num">${correct}/${total}</div><div class="summary-stat-label">Correct</div></div><div class="summary-stat"><div class="summary-stat-num">${accuracy}%</div><div class="summary-stat-label">Accuracy</div></div><div class="summary-stat"><div class="summary-stat-num">${mood}</div><div class="summary-stat-label">Mood</div></div><div class="summary-stat"><div class="summary-stat-num">+${xpEarned}</div><div class="summary-stat-label">XP Earned</div></div>`;let bdHTML=`<div class="sb-title">Question Breakdown</div>`;session.results.forEach((r,i)=>{bdHTML+=`<div class="sb-row"><div class="sb-q">Q${i+1}: ${r.question.length>38?r.question.slice(0,38)+"...":r.question}</div><span class="sb-result ${r.correct?"sb-correct":"sb-wrong"}">${r.correct?"âœ“ Correct":"âœ— Wrong"}</span></div>`});document.getElementById("summaryBreakdown").innerHTML=bdHTML;window._lastSummaryExport={student:state.name,lessonId:lesson.id,lessonTitle:lesson.title,unitTitle:unit.title,date:new Date().toLocaleDateString(),score:correct,total,accuracy,mood,xpEarned,breakdown:session.results};showScreen("summary")}
function downloadSummary(){const data=window._lastSummaryExport||{};const blob=new Blob([JSON.stringify(data,null,2)],{type:"application/json"});const a=document.createElement("a");a.href=URL.createObjectURL(blob);a.download=`Kairos_${(data.lessonId||"summary").replace(/\s/g,"_")}.json`;a.click();toast("Summary exported! ðŸ“„")}function showUnitSummary(unitId){const s=state.summaries.find(x=>x.unitId===unitId);if(!s){toast("No summary yet!");return}window._lastSummaryExport=s;downloadSummary()}let toastTimer=null;function toast(msg){const el=document.getElementById("toast");el.textContent=msg;el.classList.add("show");if(toastTimer)clearTimeout(toastTimer);toastTimer=setTimeout(()=>el.classList.remove("show"),2500)}boot();
</script>
