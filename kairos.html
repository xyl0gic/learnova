<!doctype html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kairos - Grade 3</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#F5F1E6;--card:#FFFFFF;--text:#0F2A1D;--muted:#4F7C6A;--primary:#0F2A1D;--primary-dark:#07150E;--accent:#D6B25E;--accent-dark:#B8933D;--secondary:#4F7C6A;--secondary-dark:#315545;--border:rgba(15,42,29,.15);--border-d:rgba(15,42,29,.28);--success:#4F7C6A;--success-pale:#E4EFE5;--danger:#D36135;--danger-pale:#FBE4DA;--warning:#D6B25E;--warning-pale:#F6E9C5;--ink:var(--text);--ink-soft:var(--muted);--ink-muted:rgba(15,42,29,.48);--white:var(--card);--green:var(--primary);--green-d:var(--primary-dark);--green-pale:var(--success-pale);--blue:var(--secondary);--blue-d:var(--secondary-dark);--blue-pale:#E5F0EC;--red:var(--danger);--red-d:#A84325;--red-pale:var(--danger-pale);--orange:var(--accent);--orange-pale:var(--warning-pale);--purple:var(--secondary);--purple-pale:#E8EFEA;--gold:var(--accent);--radius:16px;--radius-lg:24px;--font:"Nunito","Segoe UI",system-ui,sans-serif;
--mascot:"🌿";--mascot-correct:"✨";--mascot-wrong:"🍂";--mascot-fail:"🌾";--mascot-complete:"🏅"}
[data-theme="ink"]{--bg:#EEF2F6;--card:#FFFFFF;--text:#172033;--muted:#59677E;--primary:#172033;--primary-dark:#0A0F19;--accent:#5271FF;--accent-dark:#3651C8;--secondary:#3D7EA6;--secondary-dark:#255575;--border:rgba(23,32,51,.14);--border-d:rgba(23,32,51,.3);--success:#3D7EA6;--success-pale:#E0EDF5;--danger:#B94A48;--danger-pale:#F7DEDD;--warning:#D8A545;--warning-pale:#F7EBCF;--ink:var(--text);--ink-soft:var(--muted);--ink-muted:rgba(23,32,51,.48);--white:var(--card);--green:var(--primary);--green-d:var(--primary-dark);--green-pale:var(--success-pale);--blue:var(--accent);--blue-d:var(--accent-dark);--blue-pale:#E4E9FF;--red:var(--danger);--red-d:#8A302E;--red-pale:var(--danger-pale);--orange:var(--warning);--orange-pale:var(--warning-pale);--purple:var(--secondary);--purple-pale:#E0EDF5;--gold:var(--accent);
--mascot:"🖋️";--mascot-correct:"💡";--mascot-wrong:"📐";--mascot-fail:"📖";--mascot-complete:"🏆"}
[data-theme="neon"]{--bg:#0B0F14;--card:#121A24;--text:#E6EDF3;--muted:#9FB0C1;--primary:#00E5FF;--primary-dark:#009BC2;--accent:#8A5CFF;--accent-dark:#5A35C7;--secondary:#2DFF9B;--secondary-dark:#16B86D;--border:#2A3442;--border-d:#384657;--success:#2DFF9B;--success-pale:rgba(45,255,155,.12);--danger:#FF5D7A;--danger-pale:rgba(255,93,122,.14);--warning:#00E5FF;--warning-pale:rgba(0,229,255,.12);--ink:var(--text);--ink-soft:var(--muted);--ink-muted:rgba(230,237,243,.55);--white:var(--card);--green:var(--secondary);--green-d:var(--secondary-dark);--green-pale:var(--success-pale);--blue:var(--primary);--blue-d:var(--primary-dark);--blue-pale:#121A24;--red:var(--danger);--red-d:#C94762;--red-pale:var(--danger-pale);--orange:var(--primary);--orange-pale:var(--warning-pale);--purple:var(--accent);--purple-pale:rgba(138,92,255,.14);--gold:var(--primary);
--mascot:"⚡";--mascot-correct:"🔮";--mascot-wrong:"💫";--mascot-fail:"🌀";--mascot-complete:"🎆"}

body{font-family:var(--font);background:var(--bg);color:var(--ink);min-height:100vh;overflow-x:hidden}
.screen{display:none;min-height:100vh;flex-direction:column;align-items:center;justify-content:center;padding:1.5rem}.screen.active{display:flex}

/* ── ONBOARDING ── */
#screen-onboard{background:linear-gradient(160deg,var(--bg) 0%,var(--blue-pale) 100%)}
.onboard-mascot{font-size:72px;line-height:1;margin-bottom:1rem;animation:mascotFloat 3s ease-in-out infinite}
@keyframes mascotFloat{0%,100%{transform:translateY(0)}50%{transform:translateY(-10px)}}
.onboard-title{font-size:clamp(32px,6vw,52px);font-weight:900;text-align:center;line-height:1.1;margin-bottom:.5rem}
.onboard-title em{color:var(--green);font-style:normal;background:linear-gradient(135deg,var(--green),var(--blue));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.onboard-sub{font-size:16px;color:var(--ink-soft);text-align:center;max-width:360px;margin-bottom:2.5rem;line-height:1.7}
.name-input-wrap{display:flex;flex-direction:column;gap:12px;width:100%;max-width:340px;margin-bottom:2rem}
.name-input-wrap label{font-weight:700;font-size:14px;text-transform:uppercase;letter-spacing:.05em;color:var(--ink-muted)}
.name-input,.avatar-select{padding:14px 18px;border:2px solid var(--border-d);border-radius:var(--radius);font-family:var(--font);font-size:16px;font-weight:600;outline:none;background:var(--white);color:var(--ink);transition:border-color .2s,box-shadow .2s}
.name-input:focus,.avatar-select:focus{border-color:var(--blue);box-shadow:0 0 0 3px var(--blue-pale)}

/* ── BUTTONS ── */
.btn{display:inline-flex;align-items:center;justify-content:center;gap:8px;padding:14px 28px;border-radius:var(--radius);border:none;font-family:var(--font);font-size:16px;font-weight:800;cursor:pointer;transition:transform .1s,box-shadow .1s,opacity .15s;text-decoration:none;letter-spacing:.2px}
.btn:hover{opacity:.92}.btn:active{transform:translateY(3px)!important;box-shadow:0 1px 0!important}
.btn-green{background:var(--green);color:var(--card);box-shadow:0 4px 0 var(--green-d)}
.btn-blue{background:var(--blue);color:var(--card);box-shadow:0 4px 0 var(--blue-d)}
.btn-outline{background:var(--white);color:var(--ink);border:2px solid var(--border-d);box-shadow:0 4px 0 var(--border-d)}
.btn-lg{padding:16px 36px;font-size:18px;border-radius:var(--radius-lg);width:100%;max-width:340px}
.btn-disabled{opacity:.38;cursor:not-allowed;pointer-events:none}

/* ── MAP ── */
#screen-map{background:linear-gradient(180deg,var(--bg) 0%,var(--blue-pale) 100%);justify-content:flex-start;padding-top:0}
.map-header{width:100%;background:var(--white);border-bottom:2px solid var(--border);padding:.9rem 1.5rem;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:50;backdrop-filter:blur(8px)}
.map-logo{font-weight:900;font-size:20px;color:var(--green);display:flex;align-items:center;gap:6px}
.map-logo-icon{font-size:20px}
.map-logo span{color:var(--ink)}
.badges{display:flex;gap:8px;align-items:center}
.streak-badge,.xp-badge{display:flex;align-items:center;gap:5px;padding:6px 14px;border-radius:100px;font-size:14px;font-weight:700;border:1.5px solid var(--border)}
.streak-badge{background:var(--orange-pale);color:var(--text)}.xp-badge{background:var(--purple-pale);color:var(--text)}
.map-body{width:100%;max-width:440px;padding:1.5rem 1rem 5rem;display:flex;flex-direction:column;align-items:center}

/* Profile card */
.profile-card{width:100%;background:var(--primary);border-radius:20px;padding:1.25rem 1.5rem;margin-bottom:1.75rem;box-shadow:0 6px 0 var(--primary-dark);display:flex;align-items:center;gap:14px}
.profile-avatar-wrap{position:relative}
.profile-avatar{font-size:36px;background:rgba(255,255,255,.13);width:58px;height:58px;display:flex;align-items:center;justify-content:center;border-radius:16px;flex-shrink:0;border:2px solid rgba(255,255,255,.18)}
.profile-info h2{margin:0;font-size:17px;font-weight:800;color:var(--card);line-height:1.2}
.profile-info p{margin:4px 0 0;font-size:12px;opacity:.6;color:var(--card);font-weight:600;text-transform:uppercase;letter-spacing:.05em}
.profile-xp-bar-wrap{margin-top:8px;height:6px;background:rgba(255,255,255,.15);border-radius:100px;overflow:hidden;width:140px}
.profile-xp-bar{height:100%;background:var(--gold);border-radius:100px;transition:width .5s}

/* Unit header */
.unit-header-card{width:100%;border-radius:20px;padding:1.5rem;margin-bottom:1.25rem;text-align:center;position:relative;overflow:hidden}
.unit-header-card::before{content:"";position:absolute;top:-30px;right:-30px;width:120px;height:120px;border-radius:50%;background:rgba(255,255,255,.07);pointer-events:none}
.unit-header-card h2{font-size:20px;font-weight:900;color:var(--card);margin-bottom:4px}
.unit-header-card p{font-size:13px;color:rgba(255,255,255,.8);font-weight:600}

/* Path & nodes */
.map-path{display:flex;flex-direction:column;align-items:center;width:100%;margin-bottom:.5rem}
.map-node-wrap{display:flex;flex-direction:column;align-items:center}
.map-connector{width:4px;height:24px;border-radius:4px;transition:background .3s}
.mc-done{background:var(--green)}.mc-locked{background:var(--border-d)}
.map-node{width:76px;height:76px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:30px;cursor:pointer;transition:transform .15s,box-shadow .15s;border:none;font-family:var(--font);position:relative}
.map-node:not(.locked):hover{transform:scale(1.1)}
.map-node:not(.locked):active{transform:scale(.95)}
.node-done{background:var(--green);box-shadow:0 5px 0 var(--green-d),0 0 0 4px var(--green-pale);color:var(--card)}
.node-active{background:var(--blue);box-shadow:0 5px 0 var(--blue-d),0 0 0 4px var(--blue-pale);color:var(--card);animation:pulse 2.2s infinite}
.node-locked{background:var(--bg);box-shadow:0 5px 0 var(--border-d);color:var(--ink-muted);cursor:not-allowed;border:2px solid var(--border-d)}
@keyframes pulse{0%,100%{box-shadow:0 5px 0 var(--blue-d),0 0 0 4px var(--blue-pale)}50%{box-shadow:0 5px 0 var(--blue-d),0 0 0 8px var(--blue-pale)}}
.node-score{position:absolute;bottom:-2px;right:-4px;font-size:10px;font-weight:800;padding:1px 5px;border-radius:100px;background:var(--green);color:var(--card);border:2px solid var(--bg)}
.node-label{font-size:11px;font-weight:700;color:var(--ink-muted);margin-top:7px;text-align:center;max-width:90px;line-height:1.35}

/* Unit complete banner */
.unit-complete-banner{background:linear-gradient(135deg,var(--gold),var(--accent-dark));border-radius:20px;padding:1.5rem;text-align:center;width:100%;margin-top:1.5rem;box-shadow:0 6px 0 var(--accent-dark)}
.unit-complete-banner h3{font-size:19px;font-weight:900;margin-bottom:4px;color:var(--primary)}
.unit-complete-banner p{font-size:13px;color:rgba(15,42,29,.7);margin-bottom:1rem;font-weight:600}

/* ── LESSON ── */
#screen-lesson{background:var(--bg);justify-content:flex-start;padding:0}
.lesson-topbar{width:100%;background:var(--white);border-bottom:2px solid var(--border);padding:.9rem 1.5rem;display:flex;align-items:center;gap:1rem;position:sticky;top:0;z-index:50}
.back-btn{background:none;border:none;cursor:pointer;font-size:20px;color:var(--ink-muted);padding:6px;line-height:1;border-radius:10px;transition:background .15s,color .15s}
.back-btn:hover{background:var(--bg);color:var(--ink)}
.progress-bar-outer{flex:1;height:12px;background:var(--border);border-radius:100px;overflow:hidden}
.progress-bar-inner{height:100%;background:linear-gradient(90deg,var(--green),var(--blue));border-radius:100px;transition:width .45s cubic-bezier(.4,0,.2,1)}
.hearts{display:flex;gap:3px}
.heart{font-size:18px;transition:transform .25s,filter .25s}
.heart.lost{filter:grayscale(1);opacity:.25;transform:scale(.75)}

/* Lesson body */
.lesson-body{flex:1;width:100%;max-width:620px;margin:0 auto;padding:1.75rem 1.5rem 2rem;display:flex;flex-direction:column}

/* Mascot card */
.mascot-card{display:flex;align-items:center;gap:14px;padding:14px 18px;margin-bottom:1.5rem;background:var(--white);border:2px solid var(--border);border-radius:18px;box-shadow:0 3px 0 var(--border);transition:border-color .25s,background .25s}
.mascot-card.state-correct{background:var(--green-pale);border-color:var(--green)}
.mascot-card.state-wrong{background:var(--red-pale);border-color:var(--red)}
.mascot-card.state-fail{background:var(--orange-pale);border-color:var(--orange)}
.mascot-card.state-complete{background:var(--blue-pale);border-color:var(--blue)}
.mascot-emoji{font-size:36px;line-height:1;flex-shrink:0;transition:transform .3s}
.mascot-card.state-correct .mascot-emoji{transform:scale(1.15) rotate(-5deg)}
.mascot-card.state-wrong .mascot-emoji{transform:scale(.9) rotate(5deg)}
.mascot-text{font-size:14px;font-weight:700;color:var(--ink);line-height:1.4}
.mascot-subtext{font-size:12px;color:var(--ink-soft);margin-top:2px}

.q-type-label{font-size:12px;font-weight:800;letter-spacing:.08em;text-transform:uppercase;color:var(--blue);margin-bottom:.6rem;display:flex;align-items:center;gap:6px}
.q-type-label::before{content:"";width:3px;height:14px;background:var(--blue);border-radius:4px;display:inline-block}
.q-emoji{font-size:52px;text-align:center;margin-bottom:1rem;animation:qEmojiBounce .4s}
@keyframes qEmojiBounce{0%{transform:scale(.7)}80%{transform:scale(1.1)}100%{transform:scale(1)}}
.q-text{font-size:clamp(18px,3.5vw,23px);font-weight:800;line-height:1.4;margin-bottom:1.25rem}

/* Choices */
.choices{display:flex;flex-direction:column;gap:10px;margin-bottom:1.5rem}
.choice-btn{padding:15px 18px;border-radius:14px;border:2px solid var(--border-d);background:var(--white);font-family:var(--font);font-size:15px;font-weight:700;color:var(--ink);cursor:pointer;text-align:left;transition:all .15s;display:flex;align-items:center;gap:12px;box-shadow:0 3px 0 var(--border)}
.choice-btn:not(.disabled):hover{border-color:var(--blue);background:var(--blue-pale);transform:translateX(4px)}
.choice-btn:not(.disabled):active{transform:translateX(2px) translateY(1px)}
.choice-btn.selected{border-color:var(--blue);background:var(--blue-pale)}
.choice-btn.correct{border-color:var(--green);background:var(--green-pale)}
.choice-btn.wrong{border-color:var(--red);background:var(--red-pale)}
.choice-key{width:32px;height:32px;border-radius:9px;background:var(--border);display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:800;flex-shrink:0;transition:all .15s}
.choice-btn.selected .choice-key{background:var(--blue);color:var(--card)}
.choice-btn.correct .choice-key{background:var(--green);color:var(--card)}
.choice-btn.wrong .choice-key{background:var(--red);color:var(--card)}

/* Typed */
.typed-wrap{margin-bottom:1.5rem}
.typed-input{width:100%;padding:16px 20px;border:2px solid var(--border-d);border-radius:14px;font-family:var(--font);font-size:20px;font-weight:700;outline:none;background:var(--white);color:var(--ink);box-shadow:0 3px 0 var(--border);transition:border-color .2s,box-shadow .2s}
.typed-input:focus{border-color:var(--blue);box-shadow:0 3px 0 var(--border),0 0 0 3px var(--blue-pale)}
.typed-input.correct{border-color:var(--green);background:var(--green-pale);box-shadow:0 3px 0 var(--green-d)}
.typed-input.wrong{border-color:var(--red);background:var(--red-pale);animation:shake .3s}
@keyframes shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-7px)}75%{transform:translateX(7px)}}

/* Attempts */
.attempts-row{display:flex;gap:6px;margin-bottom:1rem;align-items:center}
.attempts-label{font-size:11px;font-weight:700;color:var(--ink-muted);margin-right:4px;text-transform:uppercase;letter-spacing:.05em}
.attempt-dot{width:9px;height:9px;border-radius:50%;background:var(--border-d);transition:background .2s,transform .2s}
.attempt-dot.used{background:var(--red);transform:scale(1.15)}
.attempt-dot.remaining{background:var(--green)}

/* Feedback */
.feedback-banner{border-radius:14px;padding:1.1rem 1.4rem;margin-bottom:1.25rem;display:flex;align-items:flex-start;gap:12px;animation:slideUp .25s cubic-bezier(.4,0,.2,1)}
@keyframes slideUp{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.feedback-banner.correct{background:var(--green-pale);border:2px solid var(--green)}
.feedback-banner.wrong{background:var(--red-pale);border:2px solid var(--red)}
.feedback-banner.maxed{background:var(--orange-pale);border:2px solid var(--orange)}
.fb-icon{font-size:22px;flex-shrink:0;margin-top:1px}
.fb-title{font-size:14px;font-weight:800;margin-bottom:2px}
.feedback-banner.correct .fb-title{color:var(--green)}
.feedback-banner.wrong .fb-title{color:var(--red)}
.feedback-banner.maxed .fb-title{color:var(--orange)}
.fb-body{font-size:13px;color:var(--ink-soft);line-height:1.5}
.action-row{display:flex;justify-content:flex-end;gap:10px;margin-top:auto;padding-top:1rem}

/* ── SUMMARY ── */
#screen-summary{background:linear-gradient(160deg,var(--bg) 0%,var(--blue-pale) 100%)}
.summary-trophy{font-size:80px;text-align:center;margin-bottom:.5rem;animation:pop .45s cubic-bezier(.34,1.56,.64,1)}
@keyframes pop{0%{transform:scale(0) rotate(-15deg)}100%{transform:scale(1) rotate(0)}}
.summary-title{font-size:clamp(26px,5vw,38px);font-weight:900;text-align:center;margin-bottom:.4rem}
.summary-sub{font-size:15px;color:var(--ink-soft);text-align:center;margin-bottom:2rem;max-width:360px;line-height:1.6}
.summary-stats{display:flex;gap:10px;margin-bottom:1.75rem;flex-wrap:wrap;justify-content:center}
.summary-stat{background:var(--white);border:2px solid var(--border);border-radius:16px;padding:1rem 1.25rem;text-align:center;min-width:90px;box-shadow:0 4px 0 var(--border);flex:1;max-width:140px}
.summary-stat-num{font-size:26px;font-weight:900;color:var(--ink)}
.summary-stat-label{font-size:11px;font-weight:700;color:var(--ink-muted);letter-spacing:.05em;text-transform:uppercase;margin-top:2px}
.summary-breakdown{width:100%;max-width:440px;background:var(--white);border:2px solid var(--border);border-radius:20px;padding:1.25rem;margin-bottom:1.75rem;box-shadow:0 4px 0 var(--border)}
.sb-title{font-size:12px;font-weight:800;color:var(--ink-muted);text-transform:uppercase;letter-spacing:.07em;margin-bottom:.75rem}
.sb-row{display:flex;align-items:center;justify-content:space-between;padding:.5rem 0;border-bottom:1px solid var(--border);font-size:13px}
.sb-row:last-child{border-bottom:none}
.sb-q{font-weight:600;flex:1;margin-right:1rem;color:var(--ink)}
.sb-result{font-weight:800;font-size:12px;padding:3px 10px;border-radius:100px;white-space:nowrap}
.sb-correct{background:var(--green-pale);color:var(--green)}.sb-wrong{background:var(--red-pale);color:var(--red-d)}
.summary-btns{display:flex;flex-direction:column;gap:10px;width:100%;max-width:340px}

/* ── THEME SWITCHER ── */
.theme-switcher{position:fixed;right:16px;bottom:16px;z-index:1000;display:flex;gap:6px;padding:7px;background:var(--card);border:2px solid var(--border);border-radius:999px;box-shadow:0 4px 16px rgba(0,0,0,.1)}
.theme-switcher button{width:36px;height:36px;border:2px solid var(--border);border-radius:50%;background:var(--bg);cursor:pointer;font-size:16px;transition:transform .15s,border-color .15s;display:flex;align-items:center;justify-content:center}
.theme-switcher button:hover{transform:translateY(-2px);border-color:var(--accent)}
.theme-switcher button.active-theme{border-color:var(--accent);box-shadow:0 0 0 3px var(--orange-pale)}

/* ── TOAST ── */
.toast{position:fixed;bottom:1.5rem;left:50%;transform:translateX(-50%) translateY(120px);background:var(--ink);color:var(--card);padding:11px 22px;border-radius:100px;font-size:14px;font-weight:700;z-index:9999;transition:transform .35s cubic-bezier(.4,0,.2,1);white-space:nowrap;pointer-events:none}
.toast.show{transform:translateX(-50%) translateY(0)}

/* ── NEON OVERRIDES ── */
[data-theme="neon"] #screen-onboard,[data-theme="neon"] #screen-map,[data-theme="neon"] #screen-summary{background:var(--bg)}
[data-theme="neon"] .map-header,[data-theme="neon"] .lesson-topbar{background:rgba(18,26,36,.95);border-color:var(--border);backdrop-filter:blur(12px)}
[data-theme="neon"] .map-logo{color:var(--blue);text-shadow:0 0 16px rgba(0,229,255,.4)}
[data-theme="neon"] .profile-card,[data-theme="neon"] .unit-header-card{background:rgba(18,26,36,.9)!important;border:1.5px solid var(--blue);box-shadow:0 0 18px rgba(0,229,255,.18)!important}
[data-theme="neon"] .profile-card{box-shadow:0 0 18px rgba(0,229,255,.15)!important}
[data-theme="neon"] .map-node{border-radius:18px;border:1.5px solid transparent}
[data-theme="neon"] .node-done{background:rgba(18,26,36,.9);border-color:var(--green);box-shadow:0 0 16px rgba(45,255,155,.3);color:var(--green)}
[data-theme="neon"] .node-active{background:rgba(18,26,36,.9);border-color:var(--blue);box-shadow:0 0 16px rgba(0,229,255,.35);color:var(--blue);animation:neonPulse 2s infinite}
[data-theme="neon"] .node-locked{background:rgba(18,26,36,.6);border-color:var(--border);box-shadow:none;opacity:.5}

// ── HELPERS ───────────────────────────────────────────
function explainQ(q){
  const t=q.q.toLowerCase();
  if(t.includes("skip"))return"Add the same number again and again!";
  if(t.includes("round"))return"5 or more → round up. 4 or less → stay down.";
  if(t.includes("expanded"))return"Break the number into each digit's value.";
  if(t.includes("compare")||t.includes("greater")||t.includes("smaller")||t.includes("largest")||t.includes("smallest"))return"Compare from the largest place value first.";
  if(t.includes("array")||t.includes("rows"))return"Arrays = rows × columns. Count them all!";
  if(t.includes("÷")||t.includes("shared")||t.includes("division"))return"Division = sharing equally into groups.";
  if(t.includes("fact famil"))return"Fact families link × and ÷ with the same numbers.";
  if(t.includes("groups of")||t.includes("×")||t.includes("bags")||t.includes("boxes"))return"Multiplication = equal groups added together.";
  if(t.includes("place")||t.includes("value")||t.includes("digit"))return"Each digit's worth depends on its position.";
  return"Use what you learned in this lesson — you've got this!";
}
function normalizeAnswer(v){return String(v).toLowerCase().replace(/,/g,"").replace(/\s*\+\s*/g,"+").replace(/\s+/g," ").trim()}
function normalizeQ(q){
  if(q.type==="multiple_choice"){
    const idx=q.options.findIndex(o=>normalizeAnswer(o)===normalizeAnswer(q.answer));
    return{type:"mcq",text:q.q,emoji:"",choices:q.options,answer:idx<0?0:idx,hint:explainQ(q)};
  }
  return{type:"typed",text:q.q,emoji:"",answer:String(q.answer),hint:explainQ(q)};
}
function buildUnit(raw,id,title,desc){
  return{id,title,description:desc,lessons:raw.lessons.map((l,i)=>({
    id:l.lessonId,title:l.title,emoji:l.icon||"📖",xp:20+i*5,
    questions:l.questions.map(normalizeQ)
  }))};
}

const CURRICULUM={units:[
  buildUnit(UPDATED_UNIT_1,"u1","Number Sense & Place Value","Place value, expanded form, comparing & rounding"),
  buildUnit(UPDATED_UNIT_2,"u2","Multiplication & Division","Groups, arrays, sharing, fact families & word problems"),
  buildUnit(UPDATED_UNIT_3,"u3","Multiplication Fluency","Equal groups, arrays, skip counting, facts & word problems")
]};

// ── THEME ─────────────────────────────────────────────
const MASCOTS={forest:{idle:"🌿",correct:"✨",wrong:"🍂",fail:"🌾",complete:"🏅"},ink:{idle:"🖋️",correct:"💡",wrong:"📐",fail:"📖",complete:"🏆"},neon:{idle:"⚡",correct:"🔮",wrong:"💫",fail:"🌀",complete:"🎆"}};
let currentTheme="forest";
function setTheme(t){
  currentTheme=t;
  if(t==="forest")document.documentElement.removeAttribute("data-theme");
  else document.documentElement.setAttribute("data-theme",t);
  localStorage.setItem("kairos_theme",t);
  document.querySelectorAll("[data-theme-choice]").forEach(b=>b.classList.toggle("active-theme",b.dataset.themeChoice===t));
  const m=MASCOTS[t]||MASCOTS.forest;
  const ob=document.getElementById("onboardMascot");
  const hm=document.getElementById("headerMascot");
  if(ob)ob.textContent=m.idle;
  if(hm)hm.textContent=m.idle;
}
function loadTheme(){setTheme(localStorage.getItem("kairos_theme")||"forest");}
function getMascot(state){return(MASCOTS[currentTheme]||MASCOTS.forest)[state]||"🌿";}

// ── STATE ─────────────────────────────────────────────
const SK="kairos_g3_v3";
let state=null;
let session={lessonId:null,unitId:null,qIndex:0,attempts:0,hearts:3,results:[],answered:false,selectedChoice:null};

function loadState(){try{state=JSON.parse(localStorage.getItem(SK));}catch(e){state=null;}}
function saveState(){localStorage.setItem(SK,JSON.stringify(state));}
function initState(name,avatar){
  state={name,avatar,xp:0,streak:0,lastDate:null,completedLessons:{},summaries:[]};
  saveState();
}

function isUnlocked(ui,li){
  if(ui===0&&li===0)return true;
  if(li===0)return CURRICULUM.units[ui-1].lessons.every(l=>!!state.completedLessons[l.id]);
  return !!state.completedLessons[CURRICULUM.units[ui].lessons[li-1].id];
}
function allUnitDone(ui){return CURRICULUM.units[ui]?.lessons.every(l=>!!state.completedLessons[l.id]);}

// ── ROUTER ────────────────────────────────────────────
function showScreen(id){document.querySelectorAll(".screen").forEach(s=>s.classList.remove("active"));document.getElementById("screen-"+id).classList.add("active");}
function boot(){loadTheme();loadState();if(!state){showScreen("onboard");return;}updateStreak();showScreen("map");renderMap();}

// ── ONBOARDING ────────────────────────────────────────
document.getElementById("nameInput").addEventListener("keydown",e=>{if(e.key==="Enter")startJourney();});
function startJourney(){
  const name=document.getElementById("nameInput").value.trim();
  if(!name){toast("Enter your name first! 😊");return;}
  const avatar=document.getElementById("avatarSelect").value;
  initState(name,avatar);
  updateStreak();
  showScreen("map");
  renderMap();
}

// ── STREAK ────────────────────────────────────────────
function updateStreak(){
  if(!state)return;
  const today=new Date().toDateString();
  if(state.lastDate!==today){
    const yest=new Date();yest.setDate(yest.getDate()-1);
    if(state.lastDate===yest.toDateString())state.streak=(state.streak||0)+1;
    else if(!state.lastDate)state.streak=0;
    state.lastDate=today;saveState();
  }
}

// ── MAP ───────────────────────────────────────────────
function renderMap(){
  document.getElementById("streakNum").textContent=state.streak||0;
  document.getElementById("xpNum").textContent=state.xp||0;
  const body=document.getElementById("mapBody");
  const av=state.avatar||"🦊";
  const totalXP=state.xp||0;
  const xpPct=Math.min(100,((totalXP%100)/100)*100);
  body.innerHTML=`<div class="profile-card">
    <div class="profile-avatar-wrap"><div class="profile-avatar">${av}</div></div>
    <div class="profile-info">
      <h2>Hi, ${state.name}! 👋</h2>
      <p>Grade 3 Math</p>
      <div class="profile-xp-bar-wrap"><div class="profile-xp-bar" style="width:${xpPct}%"></div></div>
    </div>
  </div>`;

  CURRICULUM.units.forEach((unit,ui)=>{
    const uh=document.createElement("div");
    uh.className="unit-header-card";
    const bg=ui===0?"var(--primary)":ui===1?"var(--secondary)":"var(--blue)";
    const bs=ui===0?"var(--primary-dark)":ui===1?"var(--secondary-dark)":"var(--blue-d)";
    uh.style.cssText=`background:${bg};box-shadow:0 6px 0 ${bs}`;
    uh.innerHTML=`<h2>Unit ${ui+1}: ${unit.title}</h2><p>${unit.description}</p>`;
    body.appendChild(uh);

    const path=document.createElement("div");path.className="map-path";

    unit.lessons.forEach((lesson,li)=>{
      const done=!!state.completedLessons[lesson.id];
      const unlocked=isUnlocked(ui,li);
      if(li>0){
        const c=document.createElement("div");
        c.className="map-connector "+(!!state.completedLessons[unit.lessons[li-1].id]?"mc-done":"mc-locked");
        path.appendChild(c);
      }
      const wrap=document.createElement("div");wrap.className="map-node-wrap";
      const node=document.createElement("button");
      node.className=`map-node ${done?"node-done":unlocked?"node-active":"node-locked"}`;
      if(!unlocked)node.classList.add("locked");
      node.textContent=done?"✓":unlocked?lesson.emoji:"🔒";
      if(unlocked||done)node.onclick=()=>startLesson(unit.id,lesson.id);
      if(done&&state.completedLessons[lesson.id]){
        const badge=document.createElement("span");
        badge.className="node-score";
        badge.textContent=state.completedLessons[lesson.id].accuracy+"%";
        node.appendChild(badge);
      }
      const lbl=document.createElement("div");
      lbl.className="node-label";
      lbl.style.color=done?"var(--green)":unlocked?"var(--blue)":"var(--ink-muted)";
      lbl.textContent=lesson.title;
      wrap.append(node,lbl);
      path.appendChild(wrap);
    });

    body.appendChild(path);

    if(allUnitDone(ui)){
      const banner=document.createElement("div");banner.className="unit-complete-banner";
      banner.innerHTML=`<h3>🎉 Unit ${ui+1} Complete!</h3><p>Every lesson mastered.</p>
        <button class="btn btn-outline" style="margin:0 auto;display:flex;font-size:14px" onclick="showUnitSummary('${unit.id}')">📊 View Summary</button>`;
      body.appendChild(banner);
    }
    const sp=document.createElement("div");sp.style.height="1.75rem";body.appendChild(sp);
  });
}

// ── LESSON ────────────────────────────────────────────
function startLesson(unitId,lessonId){
  const unit=CURRICULUM.units.find(u=>u.id===unitId);
  const lesson=unit?.lessons.find(l=>l.id===lessonId);
  if(!lesson)return;
  session={unitId,lessonId,qIndex:0,attempts:0,hearts:3,results:[],answered:false,selectedChoice:null};
  showScreen("lesson");renderQuestion(lesson);
}
function getLessonData(){const u=CURRICULUM.units.find(u=>u.id===session.unitId);return u?.lessons.find(l=>l.id===session.lessonId);}
function goToMap(){showScreen("map");renderMap();}

function renderHearts(){
  const el=document.getElementById("heartsDisplay");el.innerHTML="";
  for(let i=0;i<3;i++){const h=document.createElement("span");h.className="heart"+(i>=session.hearts?" lost":"");h.textContent="❤️";el.appendChild(h);}
}

function setMascot(state,sub=""){
  const card=document.getElementById("mascotCard");
  const em=document.getElementById("mascotEmoji");
  const txt=document.getElementById("mascotText");
  const sub2=document.getElementById("mascotSub");
  if(!card)return;
  const copy={idle:"Ready? Let's go!",correct:"Nice work! Keep it up!",wrong:"Not quite — try again!",fail:"No worries, check the hint!",complete:"You finished the lesson! 🎉"};
  card.className="mascot-card state-"+state;
  em.textContent=getMascot(state);
  txt.textContent=copy[state]||copy.idle;
  if(sub2)sub2.textContent=sub;
}

function renderQuestion(lesson){
  const q=lesson.questions[session.qIndex];
  document.getElementById("progressBar").style.width=(session.qIndex/lesson.questions.length*100)+"%";
  renderHearts();
  session.answered=false;session.selectedChoice=null;session.attempts=0;
  const body=document.getElementById("lessonBody");
  body.innerHTML=`<div class="mascot-card" id="mascotCard">
    <span class="mascot-emoji" id="mascotEmoji"></span>
    <div><div class="mascot-text" id="mascotText"></div><div class="mascot-subtext" id="mascotSub">Q${session.qIndex+1} of ${lesson.questions.length}</div></div>
  </div>`;
  setMascot("idle");
  const typeLabel=document.createElement("div");typeLabel.className="q-type-label";
  typeLabel.textContent=q.type==="mcq"?"Choose the answer":"Type your answer";
  body.appendChild(typeLabel);
  if(q.emoji){const em=document.createElement("div");em.className="q-emoji";em.textContent=q.emoji;body.appendChild(em);}
  const qt=document.createElement("div");qt.className="q-text";qt.textContent=q.text;body.appendChild(qt);
  const attRow=document.createElement("div");attRow.className="attempts-row";attRow.id="attemptsRow";
  const attLbl=document.createElement("span");attLbl.className="attempts-label";attLbl.textContent="Attempts";attRow.appendChild(attLbl);
  for(let i=0;i<3;i++){const d=document.createElement("div");d.className="attempt-dot remaining";attRow.appendChild(d);}
  body.appendChild(attRow);
  const fb=document.createElement("div");fb.id="feedbackArea";body.appendChild(fb);
  q.type==="mcq"?renderMCQ(q,body):renderTyped(q,body);
}

function renderMCQ(q,body){
  const wrap=document.createElement("div");wrap.className="choices";
  ["A","B","C","D"].forEach((k,i)=>{
    if(i>=q.choices.length)return;
    const btn=document.createElement("button");btn.className="choice-btn";
    btn.innerHTML=`<span class="choice-key">${k}</span>${q.choices[i]}`;
    btn.onclick=()=>selectChoice(i);wrap.appendChild(btn);
  });
  body.appendChild(wrap);
  const ar=document.createElement("div");ar.className="action-row";ar.id="actionRow";
  const cb=document.createElement("button");cb.className="btn btn-green btn-disabled";cb.id="checkBtn";cb.textContent="Check ✓";cb.onclick=()=>submitMCQ(q);
  ar.appendChild(cb);body.appendChild(ar);
}

function selectChoice(idx){
  if(session.answered)return;
  session.selectedChoice=idx;
  document.querySelectorAll(".choice-btn").forEach((b,i)=>b.classList.toggle("selected",i===idx));
  document.getElementById("checkBtn")?.classList.remove("btn-disabled");
}

function renderTyped(q,body){
  const wrap=document.createElement("div");wrap.className="typed-wrap";
  const inp=document.createElement("input");
  inp.className="typed-input";inp.id="typedInput";inp.type="text";inp.placeholder="Type your answer...";inp.autocomplete="off";
  inp.addEventListener("keydown",e=>{if(e.key==="Enter")submitTyped(q);});
  wrap.appendChild(inp);body.appendChild(wrap);
  const ar=document.createElement("div");ar.className="action-row";ar.id="actionRow";
  const cb=document.createElement("button");cb.className="btn btn-blue";cb.textContent="Check ✓";cb.onclick=()=>submitTyped(q);
  ar.appendChild(cb);body.appendChild(ar);
  setTimeout(()=>inp.focus(),60);
}

function submitMCQ(q){
  if(session.answered||session.selectedChoice===null)return;
  const correct=session.selectedChoice===q.answer;
  document.querySelectorAll(".choice-btn").forEach((b,i)=>{
    if(i===q.answer)b.classList.add("correct");
    else if(i===session.selectedChoice&&!correct)b.classList.add("wrong");
    b.classList.add("disabled");b.onclick=null;
  });
  handleAnswer(correct,q,String(session.selectedChoice));
}

function submitTyped(q){
  if(session.answered)return;
  const inp=document.getElementById("typedInput");if(!inp)return;
  const val=inp.value.trim();if(!val){toast("Type something first ✏️");return;}
  const correct=normalizeAnswer(val)===normalizeAnswer(q.answer);
  if(correct)inp.classList.add("correct");
  else{inp.classList.add("wrong");setTimeout(()=>inp?.classList.remove("wrong"),400);}
  handleAnswer(correct,q,val);
  if(correct||session.attempts>=2)inp.disabled=true;
}

function handleAnswer(correct,q,given){
  session.attempts++;
  updateAttemptDots();
  if(correct){
    session.answered=true;
    session.results.push({correct:true,attempts:session.attempts,answerGiven:given,question:q.text,correctAnswer:String(q.answer)});
    setMascot("correct");
    showFeedback("correct","🎉 Correct!","");
    replaceCheckWithNext();
  } else if(session.attempts>=3){
    session.answered=true;
    session.hearts=Math.max(0,session.hearts-1);renderHearts();
    session.results.push({correct:false,attempts:session.attempts,answerGiven:given,question:q.text,correctAnswer:String(q.answer)});
    const ans=q.type==="mcq"?q.choices[q.answer]:q.answer;
    setMascot("fail");
    showFeedback("maxed","Nice try! 💡",`Correct answer: <strong>${ans}</strong>`);
    replaceCheckWithNext();
    if(q.type==="mcq")document.querySelectorAll(".choice-btn").forEach((b,i)=>{b.classList.add("disabled");b.onclick=null;if(i===q.answer)b.classList.add("correct");});
  } else {
    session.hearts=Math.max(0,session.hearts-1);renderHearts();
    setMascot("wrong");
    showFeedback("wrong","Not quite 🤔",q.hint?`Hint: ${q.hint}`:`${3-session.attempts} attempt${3-session.attempts!==1?"s":""} left.`);
    if(q.type==="mcq"){
      session.selectedChoice=null;
      document.querySelectorAll(".choice-btn").forEach((b,i)=>{b.classList.remove("selected","correct","wrong");b.onclick=()=>selectChoice(i);});
      document.getElementById("checkBtn")?.classList.add("btn-disabled");
    } else {
      const inp=document.getElementById("typedInput");if(inp){inp.disabled=false;inp.value="";inp.focus();}
    }
  }
}

function updateAttemptDots(){
  document.querySelectorAll("#attemptsRow .attempt-dot").forEach((d,i)=>{
    d.className="attempt-dot "+(i<session.attempts?"used":"remaining");
  });
}

function showFeedback(type,title,msg){
  const icons={correct:"✅",wrong:"❌",maxed:"💡"};
  document.getElementById("feedbackArea").innerHTML=`<div class="feedback-banner ${type}">
    <span class="fb-icon">${icons[type]}</span>
    <div><div class="fb-title">${title}</div><div class="fb-body">${msg}</div></div>
  </div>`;
}

function replaceCheckWithNext(){
  const ar=document.getElementById("actionRow");if(!ar)return;
  const lesson=getLessonData();if(!lesson)return;
  const isLast=session.qIndex>=lesson.questions.length-1;
  ar.innerHTML="";
  const btn=document.createElement("button");
  btn.className="btn btn-green";
  btn.textContent=isLast?"Finish 🏁":"Next →";
  btn.onclick=isLast?finishLesson:nextQuestion;
  ar.appendChild(btn);
}

function nextQuestion(){session.qIndex++;renderQuestion(getLessonData());}

// ── FINISH ────────────────────────────────────────────
function finishLesson(){
  setMascot("complete");
  const lesson=getLessonData();
  const unit=CURRICULUM.units.find(u=>u.id===session.unitId);
  if(!lesson||!unit)return;
  const correct=session.results.filter(r=>r.correct).length;
  const total=session.results.length;
  const accuracy=total>0?Math.round((correct/total)*100):0;
  const xpEarned=Math.round((lesson.xp||20)*(accuracy/100));
  state.completedLessons[lesson.id]={score:correct,total,accuracy,xpEarned,date:new Date().toLocaleDateString()};
  state.xp=(state.xp||0)+xpEarned;
  updateStreak();
  if(allUnitDone(CURRICULUM.units.indexOf(unit)))buildUnitSummary(unit);
  saveState();
  showSummaryScreen(lesson,unit,correct,total,accuracy,xpEarned);
}

function buildUnitSummary(unit){
  const s={unitId:unit.id,unitTitle:unit.title,student:state.name,completedDate:new Date().toLocaleDateString(),
    lessons:unit.lessons.map(l=>{const r=state.completedLessons[l.id]||{};return{lessonId:l.id,title:l.title,...r};}),
    totalXP:unit.lessons.reduce((a,l)=>a+(state.completedLessons[l.id]?.xpEarned||0),0),
    averageAccuracy:Math.round(unit.lessons.reduce((a,l)=>a+(state.completedLessons[l.id]?.accuracy||0),0)/unit.lessons.length)
  };
  if(!state.summaries)state.summaries=[];
  const idx=state.summaries.findIndex(x=>x.unitId===unit.id);
  idx>=0?state.summaries[idx]=s:state.summaries.push(s);
}

function showSummaryScreen(lesson,unit,correct,total,accuracy,xpEarned){
  const mood=accuracy===100?"excited":accuracy>=70?"happy":accuracy>=50?"neutral":"coach";
  const copy={excited:"Perfect score — absolutely crushed it!",happy:"Great work, keep the streak going!",neutral:"Good effort. A little review will help.",coach:"No stress — let's slow down and practice."};
  const trophy=getMascot("complete");
  const title={excited:"Amazing Score!",happy:"Great Work!",neutral:"Lesson Done!",coach:"Keep Practicing!"}[mood];
  document.getElementById("summaryTrophy").textContent=trophy;
  document.getElementById("summaryTitle").textContent=title;
  document.getElementById("summarySub").textContent=`${lesson.title} — ${copy[mood]}`;
  document.getElementById("summaryStats").innerHTML=`
    <div class="summary-stat"><div class="summary-stat-num">${correct}/${total}</div><div class="summary-stat-label">Correct</div></div>
    <div class="summary-stat"><div class="summary-stat-num">${accuracy}%</div><div class="summary-stat-label">Accuracy</div></div>
    <div class="summary-stat"><div class="summary-stat-num">+${xpEarned}</div><div class="summary-stat-label">XP Earned</div></div>`;
  let bd=`<div class="sb-title">Question Breakdown</div>`;
  session.results.forEach((r,i)=>{
    const q=r.question.length>42?r.question.slice(0,42)+"…":r.question;
    bd+=`<div class="sb-row"><div class="sb-q">Q${i+1}: ${q}</div><span class="sb-result ${r.correct?"sb-correct":"sb-wrong"}">${r.correct?"✓ Correct":"✗ Wrong"}</span></div>`;
  });
  document.getElementById("summaryBreakdown").innerHTML=bd;
  window._lastSummaryExport={student:state.name,avatar:state.avatar,lessonId:lesson.id,lessonTitle:lesson.title,unitTitle:unit.title,date:new Date().toLocaleDateString(),score:correct,total,accuracy,xpEarned,mood,breakdown:session.results};
  showScreen("summary");
}

function downloadSummary(){
  const data=window._lastSummaryExport||{};
  const blob=new Blob([JSON.stringify(data,null,2)],{type:"application/json"});
  const a=document.createElement("a");a.href=URL.createObjectURL(blob);
  a.download=`kairos_${data.lessonId||"summary"}.json`;a.click();
  toast("Summary exported! 📄");
}

function showUnitSummary(unitId){
  const s=state?.summaries?.find(x=>x.unitId===unitId);
  if(!s){toast("Complete the unit first!");return;}
  window._lastSummaryExport=s;downloadSummary();
}

let _tt=null;
function toast(msg){
  const el=document.getElementById("toast");el.textContent=msg;el.classList.add("show");
  if(_tt)clearTimeout(_tt);_tt=setTimeout(()=>el.classList.remove("show"),2600);
}

boot();
</script>
