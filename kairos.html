nsition:transform .15s,border-color .15s}.theme-switcher button:hover{transform:translateY(-2px);border-color:var(--accent)}.theme-switcher button.active-theme{border-color:var(--accent);box-shadow:0 0 0 3px var(--orange-pale)}.toast{position:fixed;bottom:1.5rem;left:50%;transform:translateX(-50%) translateY(100px);background:var(--ink);color:var(--card);padding:12px 24px;border-radius:100px;font-size:15px;font-weight:700;z-index:999;transition:transform .35s;white-space:nowrap}.toast.show{transform:translateX(-50%) translateY(0)}

<body>
<div class="toast" id="toast"></div>
<div class="screen" id="screen-onboard"><div class="onboard-logo">🦉</div><h1 class="onboard-title">Welcome to<br><em>Kairos!</em></h1><p class="onboard-sub">Enter a family phone number, then choose or create a learner. Each learner gets separate saved progress.</p><div class="name-input-wrap"><label for="phoneInput">Family phone number</label><input class="name-input" id="phoneInput" type="tel" placeholder="Phone number..." maxlength="18" autocomplete="tel" oninput="refreshLearnerChoices()"><label for="learnerSelect">Existing learner</label><select class="name-input" id="learnerSelect"><option value="new">Create a new learner</option></select><label for="nameInput">Learner name</label><input class="name-input" id="nameInput" type="text" placeholder="First name..." maxlength="24" autocomplete="off"></div><div class="companion-card"><h2 style="font-size:24px;margin-bottom:8px">Create your companion</h2><div id="companionPreview">🦖</div><div id="companionLabel">T-Rex Trainer</div><div class="avatar-grid"><button class="avatar-option selected" type="button" onclick="chooseAvatar('trex',this)">🦖 T-Rex</button><button class="avatar-option" type="button" onclick="chooseAvatar('bot',this)">🤖 Bot</button><button class="avatar-option" type="button" onclick="chooseAvatar('raptor',this)">🦕 Raptor</button><button class="avatar-option" type="button" onclick="chooseAvatar('bronto',this)">🦕 Bronto</button></div></div><button class="btn btn-green btn-lg" id="startBtn" onclick="startJourney()">Start Learning</button></div>
<div class="screen" id="screen-map"><div class="map-header"><div class="map-logo">Kairos</div><div style="display:flex;gap:8px;align-items:center"><a class="xp-badge" style="text-decoration:none" href="math-scope.html">Plan</a><button class="xp-badge" style="border:0;cursor:pointer" onclick="switchLearner()">Switch</button><div class="streak-badge">🔥 <span id="streakNum">0</span></div><div class="xp-badge">⭐ <span id="xpNum">0</span> XP</div></div></div><div class="map-body" id="mapBody"><div class="profile-header"><div class="avatar" id="profileAvatar">🦊</div><div class="profile-text"><h2 id="welcomeText">Welcome</h2><p>Kairos Learning Path</p></div></div></div></div>
<div class="screen" id="screen-lesson"><div class="lesson-topbar"><button class="back-btn" onclick="goToMap()" title="Back to map">×</button><div class="progress-bar-outer"><div class="progress-bar-inner" id="progressBar" style="width:0%"></div></div><div class="hearts" id="heartsDisplay"></div></div><div class="lesson-body" id="lessonBody"></div></div>

roups.";if(text.includes("fact famil"))return"Fact families show connected multiplication and division equations using the same numbers.";if(text.includes("groups of")||text.includes("×")||text.includes("multiplication")||text.includes("bags")||text.includes("boxes")||text.includes("packs"))return"Multiplication is repeated addition with equal groups.";if(text.includes("+")||text.includes("addition"))return"Add by place value: ones with ones, tens with tens, hundreds with hundreds.";if(text.includes("place")||text.includes("value")||text.includes("hundreds")||text.includes("tens")||text.includes("thousands"))return"Place value tells what a digit is worth based on where it sits in the number.";return"Think about the math model from this lesson, then try the next one."}

function loadFamilyByPhone(phone){const cleaned=cleanPhone(phone);if(cleaned.length<10)return null;const key=familyStorageKey(cleaned);const saved=localStorage.getItem(key);if(saved){try{return JSON.parse(saved)}catch(e){}}const family=createEmptyFamily(cleaned);localStorage.setItem(key,JSON.stringify(family));return family}
function saveFamily(family){localStorage.setItem(familyStorageKey(family.phone),JSON.stringify(family))}
function configureLearnerStorage(phone,learnerId){const clean=cleanPhone(phone),id=learnerId||"default";STORAGE_KEY=`kairos_${clean}_${id}_state`;PROGRESS_KEY=`kairos_${clean}_${id}_progress`;localStorage.setItem(KAIROS_PHONE_KEY,clean);localStorage.setItem(KAIROS_ACTIVE_LEARNER_KEY,id)}
function refreshLearnerChoices(){const phone=document.getElementById("phoneInput")?.value||localStorage.getItem(KAIROS_PHONE_KEY)||"";const family=loadFamilyByPhone(phone);const select=document.getElementById("learnerSelect");if(!select)return;select.innerHTML=`<option value="new">Create a new learner</option>`;if(!family)return;family.learners.forEach(learner=>{const opt=document.createElement("option");opt.value=learner.id;opt.textContent=learner.name;select.appendChild(opt)})}
function switchLearner(){state=null;progress=null;showScreen("onboard");const phone=document.getElementById("phoneInput");if(phone)phone.value=localStorage.getItem(KAIROS_PHONE_KEY)||"";refreshLearnerChoices();chooseAvatar(selectedAvatar)}
function getOrCreateLearner(phone,name,avatar){const family=loadFamilyByPhone(phone);if(!family)return null;const select=document.getElementById("learnerSelect");let learner=select&&select.value!=="new"?family.learners.find(l=>l.id===select.value):null;if(!learner){learner={id:"learner_"+Date.now(),name:String(name||"Student").trim(),grade:2,avatar,createdAt:new Date().toISOString()};family.learners.push(learner)}else{learner.name=learner.name||String(name||"Student").trim();learner.avatar=learner.avatar||avatar}saveFamily(family);configureLearnerStorage(family.phone,learner.id);selectedAvatar=learner.avatar||selectedAvatar;return learner}
function getActiveLearner(){const phone=localStorage.getItem(KAIROS_PHONE_KEY),learnerId=localStorage.getItem(KAIROS_ACTIVE_LEARNER_KEY);if(!phone||!learnerId)return null;const family=loadFamilyByPhone(phone);return family?.learners.find(l=>l.id===learnerId)||null}
function saveActiveLearnerSnapshot(){const phone=localStorage.getItem(KAIROS_PHONE_KEY),learnerId=localStorage.getItem(KAIROS_ACTIVE_LEARNER_KEY);if(!phone||!learnerId)return;const family=loadFamilyByPhone(phone);if(!family)return;const learner=family.learners.find(l=>l.id===learnerId);if(!learner)return;learner.name=state?.name||learner.name;learner.avatar=selectedAvatar;learner.progress=progress;learner.state=state;learner.updatedAt=new Date().toISOString();saveFamily(family)}
function createProgress(){return{map:{grade:2,subject:"math",pathStyle:"vertical_nodes",units:CURRICULUM.units.map(unit=>({unitId:unit.id,nodes:unit.lessons.map((lesson,i)=>({id:lesson.id,status:i===0?"unlocked":"locked"}))}))},lessonUnlocked:1,scores:{},mood:"coach"}}
function createGrade2Progress(){return createProgress()}
function lessonUnlockedFor(unitId,lessonIndex){const unitIndex=CURRICULUM.units.findIndex(unit=>unit.id===unitId);if(unitIndex<0)return false;if(unitIndex===0)return lessonIndex<progress.lessonUnlocked;if(lessonIndex===0)return allUnitLessonsDone(unitIndex-1);return !!state.completedLessons[CURRICULUM.units[unitIndex].lessons[lessonIndex-1].id]||progress.scores[CURRICULUM.units[unitIndex].lessons[lessonIndex-1].id]!==undefined}
function rebuildProgressMap(){progress.map={grade:2,subject:"math",pathStyle:"vertical_nodes",units:CURRICULUM.units.map(unit=>({unitId:unit.id,nodes:unit.lessons.map((lesson,i)=>({id:lesson.id,status:progress.scores[lesson.id]!==undefined?"completed":lessonUnlockedFor(unit.id,i)?"unlocked":"locked"}))}))}}
function loadProgress(){try{progress=JSON.parse(localStorage.getItem(PROGRESS_KEY))}catch(e){}if(!progress)progress=createProgress();if(!progress.scores)progress.scores={};if(!progress.lessonUnlocked)progress.lessonUnlocked=1;if(!progress.map)progress.map=createProgress().map;if(state){rebuildProgressMap();state.progress=progress}}
function saveProgress(){if(!progress)progress=createProgress();localStorage.setItem(PROGRESS_KEY,JSON.stringify(progress));const profile=loadProfile(false);if(profile){profile.progress=progress;localStorage.setItem("kairos_profile",JSON.stringify(profile))}if(state){state.progress=progress;localStorage.setItem(STORAGE_KEY,JSON.stringify(state))}saveActiveLearnerSnapshot()}
function getMood(score){if(score>90)return"excited";if(score>70)return"happy";if(score>50)return"neutral";return"coach"}
function loadState(){try{state=JSON.parse(localStorage.getItem(STORAGE_KEY))}catch(e){state=null}}function saveState(){localStorage.setItem(STORAGE_KEY,JSON.stringify(state));saveActiveLearnerSnapshot()}function initState(name){progress=createProgress();state={name,xp:0,streak:0,lastDate:null,completedLessons:{},summaries:[],progress};saveState();saveProgress()}function showScreen(id){document.querySelectorAll(".screen").forEach(s=>s.classList.remove("active"));document.getElementById("screen-"+id).classList.add("active")}function boot(){loadTheme();selectedAvatar=avatarKeyFromStorage(localStorage.getItem("kairos-avatar"));const phone=localStorage.getItem(KAIROS_PHONE_KEY),learnerId=localStorage.getItem(KAIROS_ACTIVE_LEARNER_KEY);if(phone&&learnerId)configureLearnerStorage(phone,learnerId);loadState();if(!state){showScreen("onboard");chooseAvatar(selectedAvatar);refreshLearnerChoices();return}loadProgress();loadProfile();updateStreak();showScreen("map");renderMap()}
document.getElementById("nameInput").addEventListener("keydown",e=>{if(e.key==="Enter")startJourney()});document.getElementById("phoneInput")?.addEventListener("keydown",e=>{if(e.key==="Enter")startJourney()});function startJourney(){const phone=document.getElementById("phoneInput").value.trim();const name=document.getElementById("nameInput").value.trim();if(cleanPhone(phone).length<10){toast("Please enter a full phone number.");return}const learner=getOrCreateLearner(phone,name||"Student",selectedAvatar);if(!learner){toast("Please check the phone number.");return}loadState();if(!state)initState(learner.name);else{state.name=learner.name;saveState()}saveProfile();updateStreak();showScreen("map");renderMap()}
function updateStreak(){if(!state)return;const today=new Date().toDateString();if(state.lastDate!==today){const yest=new Date();yest.setDate(yest.getDate()-1);if(state.lastDate===yest.toDateString())state.streak=(state.streak||0)+1;else state.streak=state.streak||0;state.lastDate=today;saveState()}}
function renderMap(){document.getElementById("streakNum").textContent=state.streak||0;document.getElementById("xpNum").textContent=state.xp||0;if(!progress)loadProgress();const body=document.getElementById("mapBody");body.innerHTML=`<div class="profile-header"><div class="avatar" id="profileAvatar">🦊</div><div class="profile-text"><h2 id="welcomeText">Welcome</h2><p>Kairos Learning Path</p></div></div>`;loadProfile();CURRICULUM.units.forEach((unit,ui)=>{const uh=document.createElement("div");uh.className="unit-header-card";uh.style.background=ui%2?"var(--secondary)":"var(--primary)";uh.style.boxShadow=`0 6px 0 ${ui%2?"var(--secondary-dark)":"var(--primary-dark)"}`;uh.innerHTML=`<h2>Unit ${ui+1}: ${unit.title}</h2><p>${unit.description}</p>`;body.appendChild(uh);const path=document.createElement("div");path.className="map-path";unit.lessons.forEach((lesson,li)=>{const done=!!state.completedLessons[lesson.id]||progress.scores[lesson.id]!==undefined;const unlocked=lessonUnlockedFor(unit.id,li);if(li>0){const conn=document.createElement("div");conn.className="map-connector "+(progress.scores[unit.lessons[li-1].id]!==undefined?"mc-done":"mc-locked");path.appendChild(conn)}const wrap=document.createElement("div");wrap.className="map-node-wrap";const node=document.createElement("button");node.className=`map-node ${done?"node-done":unlocked?"node-active":"node-locked"}`;node.textContent=done?"✓":unlocked?lesson.emoji:"🔒";if(!unlocked)node.classList.add("locked");if(unlocked)node.onclick=()=>startLesson(unit.id,lesson.id);const label=document.createElement("div");label.className="node-label";label.style.color=done?"var(--primary)":unlocked?"var(--secondary)":"var(--ink-muted)";label.textContent=lesson.title;if(unlocked&&!done){const walker=document.createElement("span");walker.className="map-walker";walker.textContent=avatarFromValue(selectedAvatar);wrap.appendChild(walker)}wrap.append(node,label);path.appendChild(wrap)});body.appendChild(path);if(allUnitLessonsDone(ui)){const banner=document.createElement("div");banner.className="unit-complete-banner";banner.innerHTML=`<h3>🎉 Unit ${ui+1} Complete!</h3><p>You mastered all lessons in this unit.</p><button class="btn btn-outline" style="margin:0 auto;display:flex" onclick="showUnitSummary('${unit.id}')">📊 View Summary</button>`;body.appendChild(banner)}const sp=document.createElement("div");sp.style.height="2rem";body.appendChild(sp)})}
function allUnitLessonsDone(ui){if(ui<0)return true;const unit=CURRICULUM.units[ui];return unit&&unit.lessons.every(l=>!!state.completedLessons[l.id])}function darken(hex){let r=parseInt(hex.slice(1,3),16),g=parseInt(hex.slice(3,5),16),b=parseInt(hex.slice(5,7),16);return`rgb(${Math.max(0,r-40)},${Math.max(0,g-40)},${Math.max(0,b-40)})`}
function startLesson(unitId,lessonId){const unit=CURRICULUM.units.find(u=>u.id===unitId);const lesson=unit.lessons.find(l=>l.id===lessonId);session={unitId,lessonId,qIndex:0,attempts:0,hearts:3,results:[],answered:false,selectedChoice:null};showScreen("lesson");renderQuestion(lesson)}function getLessonData(){const unit=CURRICULUM.units.find(u=>u.id===session.unitId);return unit.lessons.find(l=>l.id===session.lessonId)}function getLessonSteps(lesson){if(lesson.teach||lesson.guided||lesson.practice||lesson.quiz)return[...(lesson.teach||[]),...(lesson.guided||[]),...(lesson.practice||[]),...(lesson.quiz||[])];return lesson.learnSteps?[...lesson.learnSteps,...lesson.quizQuestions]:lesson.questions}function isQuizStep(lesson,index){const teach=(lesson.teach||[]).length,guided=(lesson.guided||[]).length,practice=(lesson.practice||[]).length;return !!lesson.quiz&&index>=teach+guided+practice}function getHintForCurrentStep(lesson,q){return isQuizStep(lesson,session.qIndex)?"":q.hint||"Try again."}function goToMap(){showScreen("map");renderMap()}function renderHearts(){const el=document.getElementById("heartsDisplay");el.innerHTML="";for(let i=0;i<3;i++){const h=document.createElement("span");h.className="heart"+(i>=session.hearts?" lost":"");h.textContent="❤️";el.appendChild(h)}}
function avatarArt(state){const base=avatarFromValue(selectedAvatar);const faces={start:base,correct:"😄",wrong:"🤔",fail:"🦉",complete:"🎉"};const bg=state==="fail"?"#8A5CFF":state==="complete"?"#2DFF9B":state==="wrong"?"#00E5FF":"#121A24";const face=faces[state]||faces.start;const svg=`<svg xmlns="http://www.w3.org/2000/svg" width="128" height="128" viewBox="0 0 128 128"><rect width="128" height="128" rx="28" fill="#0B0F14"/><circle cx="64" cy="64" r="47" fill="${bg}" opacity=".24"/><text x="64" y="80" text-anchor="middle" font-size="58">${face}</text></svg>`;return"data:image/svg+xml;charset=UTF-8,"+encodeURIComponent(svg)}
function avatarReact(state){const avatar=document.getElementById("avatar"),text=document.getElementById("avatar-text");if(!avatar||!text)return;const copy={start:"Let's start!",correct:"Nice work!",wrong:"Try again!",fail:"We'll fix this.",complete:"You did it!"};avatar.src=avatarArt(state);avatar.className="";void avatar.offsetWidth;text.innerText=copy[state]||copy.start;if(selectedAvatar==="trex"){if(state==="correct")avatar.classList.add("bounce");if(state==="wrong"||state==="fail")avatar.classList.add("shake");if(state==="complete")avatar.classList.add("spin")}if(selectedAvatar==="bot"){if(state==="correct")avatar.classList.add("spin");if(state==="wrong"||state==="fail")avatar.classList.add("shake");if(state==="complete")avatar.classList.add("bounce")}if(selectedAvatar==="raptor"){if(state==="correct"||state==="complete")avatar.classList.add("bounce");if(state==="wrong"||state==="fail")avatar.classList.add("shake")}if(selectedAvatar==="bronto"){if(state==="correct"||state==="complete")avatar.classList.add("floaty");if(state==="wrong"||state==="fail")avatar.classList.add("shake")}}
function renderQuestion(lesson){const steps=getLessonSteps(lesson),q=steps[session.qIndex],total=steps.length;document.getElementById("progressBar").style.width=(session.qIndex/total)*100+"%";renderHearts();session.answered=false;session.selectedChoice=null;session.attempts=0;const body=document.getElementById("lessonBody");body.innerHTML=`<div class="lesson-avatar-card" id="avatar-container"><img id="avatar" alt="Kairos helper avatar"><div id="avatar-text">Let's start!</div></div>`;avatarReact("start");if(q.type==="explain"){const typeLabel=document.createElement("div");typeLabel.className="q-type-label";typeLabel.textContent="Learn";body.appendChild(typeLabel);const qt=document.createElement("div");qt.className="q-text";qt.textContent=q.text;body.appendChild(qt);const ar=document.createElement("div");ar.className="action-row";ar.id="actionRow";const nextBtn=document.createElement("button");nextBtn.className="btn btn-green";nextBtn.textContent="Next →";nextBtn.onclick=nextQuestion;ar.appendChild(nextBtn);body.appendChild(ar);return}const typeLabel=document.createElement("div");typeLabel.className="q-type-label";typeLabel.textContent=q.type==="mcq"?"Choose the correct answer":"Type your answer";body.appendChild(typeLabel);if(q.emoji){const em=document.createElement("div");em.className="q-emoji";em.textContent=q.emoji;body.appendChild(em)}const qt=document.createElement("div");qt.className="q-text";qt.textContent=q.text;body.appendChild(qt);const attRow=document.createElement("div");attRow.className="attempts-row";attRow.id="attemptsRow";for(let i=0;i<3;i++){const d=document.createElement("div");d.className="attempt-dot remaining";attRow.appendChild(d)}body.appendChild(attRow);const fb=document.createElement("div");fb.id="feedbackArea";body.appendChild(fb);q.type==="mcq"?renderMCQ(q,body):renderTyped(q,body)}
function renderMCQ(q,body){const wrap=document.createElement("div");wrap.className="choices";const keys=["A","B","C","D"];q.choices.forEach((c,i)=>{const btn=document.createElement("button");btn.className="choice-btn";btn.innerHTML=`<span class="choice-key">${keys[i]}</span>${c}`;btn.onclick=()=>selectChoice(i);wrap.appendChild(btn)});body.appendChild(wrap);const ar=document.createElement("div");ar.className="action-row";ar.id="actionRow";const checkBtn=document.createElement("button");checkBtn.className="btn btn-green btn-disabled";checkBtn.id="checkBtn";checkBtn.textContent="Check ✓";checkBtn.onclick=()=>submitMCQ(q);ar.appendChild(checkBtn);body.appendChild(ar)}
function selectChoice(idx){if(session.answered)return;session.selectedChoice=idx;document.querySelectorAll(".choice-btn").forEach((b,i)=>{b.classList.toggle("selected",i===idx)});document.getElementById("checkBtn").classList.remove("btn-disabled")}function renderTyped(q,body){const wrap=document.createElement("div");wrap.className="typed-wrap";wrap.innerHTML=`<input class="typed-input" id="typedInput" type="text" placeholder="Type your answer here..." autocomplete="off">`;body.appendChild(wrap);const ar=document.createElement("div");ar.className="action-row";ar.id="actionRow";const checkBtn=document.createElement("button");checkBtn.className="btn btn-blue";checkBtn.textContent="Check ✓";checkBtn.onclick=()=>submitTyped(q);ar.appendChild(checkBtn);body.appendChild(ar);setTimeout(()=>document.getElementById("typedInput").focus(),50)}
function submitMCQ(q){if(session.answered||session.selectedChoice===null)return;const picked=session.selectedChoice,correct=picked===q.answer;handleAnswer(correct,q,String(picked));if(correct||session.answered){document.querySelectorAll(".choice-btn").forEach((b,i)=>{b.classList.add("disabled");b.onclick=null;if(i===q.answer)b.classList.add("correct");else if(i===picked&&!correct)b.classList.add("wrong")})}}function submitTyped(q){if(session.answered)return;const inp=document.getElementById("typedInput");const val=inp.value.trim();if(!val){toast("Type something first! ✏️");return}const correct=normalizeAnswer(val)===normalizeAnswer(q.answer);inp.classList.toggle("correct",correct);if(!correct){inp.classList.add("wrong");setTimeout(()=>inp.classList.remove("wrong"),400)}handleAnswer(correct,q,val);if(correct||session.attempts>=3)inp.disabled=true}
function handleAnswer(correct,q,given){session.attempts++;updateAttemptDots();if(correct){avatarReact("correct");session.answered=true;session.results.push({correct:true,attempts:session.attempts,answerGiven:given,question:q.text,correctAnswer:String(q.answer)});showFeedback("correct","🎉 Correct!","");replaceCheckWithNext()}else if(session.attempts>=3){avatarReact("fail");session.answered=true;session.hearts=Math.max(0,session.hearts-1);renderHearts();session.results.push({correct:false,attempts:session.attempts,answerGiven:given,question:q.text,correctAnswer:String(q.answer)});const correctText=q.type==="mcq"?q.choices[q.answer]:q.answer;showFeedback("maxed","😬 Nice try!",`The correct answer was: <strong>${correctText}</strong>`);replaceCheckWithNext();if(q.type==="mcq")document.querySelectorAll(".choice-btn").forEach((b,i)=>{b.classList.add("disabled");b.onclick=null;if(i===q.answer)b.classList.add("correct")})}else{avatarReact("wrong");session.hearts=Math.max(0,session.hearts-1);renderHearts();const hint=getHintForCurrentStep(getLessonData(),q);showFeedback("wrong","Not quite! 🤔",hint?`Hint: ${hint}`:`Try again! ${3-session.attempts} left.`);if(q.type==="mcq"){session.selectedChoice=null;document.querySelectorAll(".choice-btn").forEach((b,i)=>{b.classList.remove("selected","wrong","disabled");b.onclick=()=>selectChoice(i)});document.getElementById("checkBtn").classList.add("btn-disabled")}else{const inp=document.getElementById("typedInput");inp.disabled=false;inp.value="";inp.focus()}}}
function updateAttemptDots(){const dots=document.querySelectorAll("#attemptsRow .attempt-dot");dots.forEach((d,i)=>{d.className="attempt-dot "+(i<session.attempts?"used":"remaining")})}function showFeedback(type,title,body){document.getElementById("feedbackArea").innerHTML=`<div class="feedback-banner ${type}"><span class="fb-icon">${{correct:"✅",wrong:"❌",maxed:"💡"}[type]}</span><div><div class="fb-title">${title}</div><div class="fb-body">${body}</div></div></div>`}function replaceCheckWithNext(){const ar=document.getElementById("actionRow");const lesson=getLessonData();const steps=getLessonSteps(lesson);const isLast=session.qIndex>=steps.length-1;ar.innerHTML="";const nextBtn=document.createElement("button");nextBtn.className="btn btn-green";nextBtn.textContent=isLast?"Finish 🏁":"Next →";nextBtn.onclick=isLast?finishLesson:nextQuestion;ar.appendChild(nextBtn)}function nextQuestion(){session.qIndex++;renderQuestion(getLessonData())}
function finishLesson(){avatarReact("complete");const lesson=getLessonData();const unit=CURRICULUM.units.find(u=>u.id===session.unitId);const correct=session.results.filter(r=>r.correct).length,total=session.results.length,accuracy=Math.round((correct/total)*100),xpEarned=Math.round(lesson.xp*(accuracy/100)),date=new Date().toLocaleDateString();state.completedLessons[lesson.id]={score:correct,total,accuracy,xpEarned,date};state.xp=(state.xp||0)+xpEarned;if(!progress)loadProgress();progress.scores[lesson.id]=accuracy;progress.mood=getMood(accuracy);const li=unit.lessons.findIndex(l=>l.id===lesson.id);if(CURRICULUM.units.indexOf(unit)===0)progress.lessonUnlocked=Math.max(progress.lessonUnlocked,Math.min(unit.lessons.length,li+2));rebuildProgressMap();updateStreak();if(allUnitLessonsDone(CURRICULUM.units.indexOf(unit)))buildUnitSummary(unit);saveProgress();saveState();showSummaryScreen(lesson,unit,correct,total,accuracy,xpEarned)}
function buildUnitSummary(unit){const existing=state.summaries.findIndex(s=>s.unitId===unit.id);const summary={unitId:unit.id,unitTitle:unit.title,student:state.name,completedDate:new Date().toLocaleDateString(),lessons:unit.lessons.map(l=>{const r=state.completedLessons[l.id];return{lessonId:l.id,title:l.title,score:r?.score,total:r?.total,accuracy:r?.accuracy,xpEarned:r?.xpEarned,date:r?.date}}),totalXP:unit.lessons.reduce((a,l)=>a+(state.completedLessons[l.id]?.xpEarned||0),0),averageAccuracy:Math.round(unit.lessons.reduce((a,l)=>a+(state.completedLessons[l.id]?.accuracy||0),0)/unit.lessons.length)};existing>=0?state.summaries[existing]=summary:state.summaries.push(summary)}
function showSummaryScreen(lesson,unit,correct,total,accuracy,xpEarned){const mood=getMood(accuracy),moodCopy={excited:"You crushed it. Next lesson is ready!",happy:"Great work. Keep the streak going!",neutral:"Good effort. A little review will help.",coach:"No stress. Let's slow down and practice."};document.getElementById("summaryTrophy").textContent=mood==="excited"?"🏆":mood==="happy"?"⭐":mood==="neutral"?"📘":"💡";document.getElementById("summaryTitle").textContent=mood==="excited"?"Amazing Score!":mood==="happy"?"Great Work!":mood==="neutral"?"Lesson Done!":"Coach Mode";document.getElementById("summarySub").textContent=`${lesson.title} — ${moodCopy[mood]}`;document.getElementById("summaryStats").innerHTML=`<div class="summary-stat"><div class="summary-stat-num">${correct}/${total}</div><div class="summary-stat-label">Correct</div></div><div class="summary-stat"><div class="summary-stat-num">${accuracy}%</div><div class="summary-stat-label">Accuracy</div></div><div class="summary-stat"><div class="summary-stat-num">${mood}</div><div class="summary-stat-label">Mood</div></div><div class="summary-stat"><div class="summary-stat-num">+${xpEarned}</div><div class="summary-stat-label">XP Earned</div></div>`;let bdHTML=`<div class="sb-title">Question Breakdown</div>`;session.results.forEach((r,i)=>{bdHTML+=`<div class="sb-row"><div class="sb-q">Q${i+1}: ${r.question.length>38?r.question.slice(0,38)+"...":r.question}</div><span class="sb-result ${r.correct?"sb-correct":"sb-wrong"}">${r.correct?"✓ Correct":"✗ Wrong"}</span></div>`});document.getElementById("summaryBreakdown").innerHTML=bdHTML;window._lastSummaryExport={student:state.name,lessonId:lesson.id,lessonTitle:lesson.title,unitTitle:unit.title,date:new Date().toLocaleDateString(),score:correct,total,accuracy,mood,xpEarned,breakdown:session.results};showScreen("summary")}
function downloadSummary(){const data=window._lastSummaryExport||{};const blob=new Blob([JSON.stringify(data,null,2)],{type:"application/json"});const a=document.createElement("a");a.href=URL.createObjectURL(blob);a.download=`Kairos_${(data.lessonId||"summary").replace(/\s/g,"_")}.json`;a.click();toast("Summary exported! 📄")}function showUnitSummary(unitId){const s=state.summaries.find(x=>x.unitId===unitId);if(!s){toast("No summary yet!");return}window._lastSummaryExport=s;downloadSummary()}let toastTimer=null;function toast(msg){const el=document.getElementById("toast");el.textContent=msg;el.classList.add("show");if(toastTimer)clearTimeout(toastTimer);toastTimer=setTimeout(()=>el.classList.remove("show"),2500)}boot();
</script>
