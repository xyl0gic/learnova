<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Learnova — Curriculum</title>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,600;9..144,700&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet" />
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --cream: #FDFAF4;
    --warm-white: #FFF9F0;
    --ink: #1C1A14;
    --ink-soft: #4A4740;
    --ink-muted: #8A8680;
    --amber: #E8A020;
    --amber-light: #FDE9B8;
    --amber-pale: #FFF4D9;
    --teal: #1D9E75;
    --teal-light: #E1F5EE;
    --coral: #D85A30;
    --coral-light: #FAECE7;
    --purple: #534AB7;
    --purple-light: #EEEDFE;
    --blue: #1A6FC4;
    --blue-light: #E4EFFC;
    --border: rgba(28,26,20,0.1);
    --radius: 16px;
    --radius-sm: 10px;
  }
  html { scroll-behavior: smooth; }
  body { font-family: 'DM Sans', sans-serif; background: var(--cream); color: var(--ink); line-height: 1.6; overflow-x: hidden; }

  /* NAV */
  nav {
    position: sticky; top: 0; z-index: 100;
    background: rgba(253,250,244,0.92); backdrop-filter: blur(12px);
    border-bottom: 1px solid var(--border);
    padding: 0 2rem; display: flex; align-items: center; justify-content: space-between; height: 64px;
  }
  .logo { font-family: 'Fraunces', serif; font-size: 22px; font-weight: 700; color: var(--ink); display: flex; align-items: center; gap: 8px; text-decoration: none; cursor: pointer; }
  .logo-dot { width: 10px; height: 10px; border-radius: 50%; background: var(--amber); display: inline-block; }
  .nav-links { display: flex; align-items: center; gap: 2rem; }
  .nav-links a { text-decoration: none; color: var(--ink-soft); font-size: 15px; font-weight: 500; }
  .nav-links a.active { color: var(--ink); font-weight: 600; }
  .btn-nav { background: var(--ink); color: var(--cream); padding: 9px 20px; border-radius: 100px; border: none; font-family: 'DM Sans', sans-serif; font-size: 14px; font-weight: 600; cursor: pointer; text-decoration: none; display: inline-block; }

  /* PAGE HEADER */
  .page-header {
    background: var(--warm-white); border-bottom: 1px solid var(--border);
    padding: 4rem 2rem 3rem; text-align: center;
  }
  .breadcrumb { font-size: 13px; color: var(--ink-muted); margin-bottom: 1rem; }
  .breadcrumb span { color: var(--ink-soft); }
  h1 { font-family: 'Fraunces', serif; font-size: clamp(36px, 5vw, 58px); font-weight: 700; line-height: 1.1; margin-bottom: 1rem; }
  h1 em { font-style: italic; color: var(--teal); }
  .header-sub { font-size: 17px; color: var(--ink-soft); max-width: 500px; margin: 0 auto 2rem; line-height: 1.7; }

  /* GRADE TABS */
  .grade-tabs-wrap { background: white; border-bottom: 1px solid var(--border); position: sticky; top: 64px; z-index: 90; }
  .grade-tabs { max-width: 1080px; margin: 0 auto; padding: 0 2rem; display: flex; gap: 0; overflow-x: auto; scrollbar-width: none; }
  .grade-tabs::-webkit-scrollbar { display: none; }
  .grade-tab {
    padding: 1rem 1.25rem; font-size: 14px; font-weight: 500; color: var(--ink-muted);
    border-bottom: 2px solid transparent; cursor: pointer; white-space: nowrap;
    transition: all 0.2s; background: none; border-top: none; border-left: none; border-right: none;
    font-family: 'DM Sans', sans-serif;
  }
  .grade-tab:hover { color: var(--ink); }
  .grade-tab.active { color: var(--teal); border-bottom-color: var(--teal); font-weight: 600; }

  /* MAIN LAYOUT */
  .main { max-width: 1080px; margin: 0 auto; padding: 3rem 2rem; display: grid; grid-template-columns: 260px 1fr; gap: 2.5rem; align-items: start; }

  /* SIDEBAR */
  .sidebar { position: sticky; top: 120px; }
  .sidebar-section { margin-bottom: 2rem; }
  .sidebar-label { font-size: 11px; font-weight: 700; letter-spacing: 0.08em; text-transform: uppercase; color: var(--ink-muted); margin-bottom: 0.75rem; display: block; }
  .subject-btn {
    display: flex; align-items: center; gap: 10px; width: 100%;
    padding: 10px 14px; border-radius: var(--radius-sm); border: none;
    background: transparent; text-align: left; cursor: pointer;
    font-family: 'DM Sans', sans-serif; font-size: 14px; font-weight: 500; color: var(--ink-soft);
    transition: all 0.15s; margin-bottom: 2px;
  }
  .subject-btn:hover { background: rgba(28,26,20,0.05); color: var(--ink); }
  .subject-btn.active { background: var(--teal-light); color: var(--teal); font-weight: 600; }
  .subject-icon { width: 28px; height: 28px; border-radius: 8px; display: flex; align-items: center; justify-content: center; font-size: 14px; flex-shrink: 0; }
  .s-math { background: var(--purple-light); }
  .s-english { background: var(--amber-pale); }
  .s-science { background: var(--teal-light); }
  .s-social { background: var(--coral-light); }
  .s-art { background: var(--blue-light); }
  .subject-btn.active .subject-icon { filter: none; }

  .filter-group { display: flex; flex-direction: column; gap: 6px; }
  .filter-opt { display: flex; align-items: center; gap: 8px; font-size: 14px; color: var(--ink-soft); cursor: pointer; padding: 4px 0; }
  .filter-opt input { accent-color: var(--teal); width: 15px; height: 15px; cursor: pointer; }

  /* CONTENT */
  .content {}
  .content-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 1.5rem; flex-wrap: wrap; gap: 1rem; }
  .content-title { font-family: 'Fraunces', serif; font-size: 26px; font-weight: 700; }
  .content-count { font-size: 14px; color: var(--ink-muted); }
  .search-bar {
    display: flex; align-items: center; gap: 8px;
    background: white; border: 1px solid var(--border); border-radius: 100px;
    padding: 8px 16px; width: 100%; max-width: 320px;
  }
  .search-bar input { border: none; background: none; font-family: 'DM Sans', sans-serif; font-size: 14px; color: var(--ink); outline: none; width: 100%; }
  .search-bar input::placeholder { color: var(--ink-muted); }
  .search-icon { color: var(--ink-muted); font-size: 15px; flex-shrink: 0; }

  /* UNIT CARDS */
  .units { display: flex; flex-direction: column; gap: 1.25rem; }
  .unit-card {
    background: white; border: 1px solid var(--border); border-radius: var(--radius);
    overflow: hidden; transition: box-shadow 0.2s;
  }
  .unit-card:hover { box-shadow: 0 6px 24px rgba(28,26,20,0.07); }
  .unit-header {
    padding: 1.5rem; display: flex; align-items: center; gap: 1rem; cursor: pointer;
    user-select: none;
  }
  .unit-color-bar { width: 4px; height: 48px; border-radius: 4px; flex-shrink: 0; }
  .unit-meta { flex: 1; }
  .unit-top { display: flex; align-items: center; gap: 8px; margin-bottom: 4px; flex-wrap: wrap; }
  .unit-num { font-size: 11px; font-weight: 700; letter-spacing: 0.08em; text-transform: uppercase; color: var(--ink-muted); }
  .unit-pill { font-size: 11px; font-weight: 600; padding: 2px 10px; border-radius: 100px; }
  .unit-title { font-family: 'Fraunces', serif; font-size: 18px; font-weight: 600; color: var(--ink); }
  .unit-sub { font-size: 13px; color: var(--ink-muted); margin-top: 3px; }
  .unit-right { display: flex; align-items: center; gap: 1rem; flex-shrink: 0; }
  .unit-lessons-count { font-size: 13px; color: var(--ink-muted); white-space: nowrap; }
  .chevron { font-size: 16px; color: var(--ink-muted); transition: transform 0.25s; }
  .unit-card.open .chevron { transform: rotate(180deg); }

  /* LESSONS LIST */
  .lessons-list { border-top: 1px solid var(--border); display: none; }
  .unit-card.open .lessons-list { display: block; }
  .lesson-item {
    display: flex; align-items: center; gap: 1rem;
    padding: 1rem 1.5rem; border-bottom: 1px solid var(--border);
    transition: background 0.15s; cursor: pointer;
  }
  .lesson-item:last-child { border-bottom: none; }
  .lesson-item:hover { background: var(--cream); }
  .lesson-num { width: 28px; height: 28px; border-radius: 50%; background: var(--cream); border: 1px solid var(--border); display: flex; align-items: center; justify-content: center; font-size: 12px; font-weight: 600; color: var(--ink-muted); flex-shrink: 0; }
  .lesson-info { flex: 1; }
  .lesson-name { font-size: 14px; font-weight: 500; color: var(--ink); }
  .lesson-tags { display: flex; gap: 6px; margin-top: 4px; flex-wrap: wrap; }
  .lesson-tag { font-size: 11px; padding: 2px 8px; border-radius: 100px; background: var(--cream); border: 1px solid var(--border); color: var(--ink-muted); }
  .lesson-duration { font-size: 13px; color: var(--ink-muted); white-space: nowrap; flex-shrink: 0; }
  .lesson-arrow { color: var(--ink-muted); font-size: 14px; }

  /* SUBJECT COLOR ACCENTS */
  .bar-math { background: var(--purple); }
  .bar-english { background: var(--amber); }
  .bar-science { background: var(--teal); }
  .bar-social { background: var(--coral); }
  .bar-art { background: var(--blue); }
  .pill-math { background: var(--purple-light); color: var(--purple); }
  .pill-english { background: var(--amber-pale); color: #7A5210; }
  .pill-science { background: var(--teal-light); color: var(--teal); }
  .pill-social { background: var(--coral-light); color: var(--coral); }
  .pill-art { background: var(--blue-light); color: var(--blue); }

  /* EMPTY STATE */
  .empty { text-align: center; padding: 4rem 2rem; color: var(--ink-muted); }
  .empty-icon { font-size: 48px; margin-bottom: 1rem; }
  .empty h3 { font-family: 'Fraunces', serif; font-size: 22px; color: var(--ink); margin-bottom: 0.5rem; }
  .empty p { font-size: 15px; }

  @media (max-width: 768px) {
    .main { grid-template-columns: 1fr; }
    .sidebar { position: static; }
    nav .nav-links a:not(.btn-nav) { display: none; }
  }
</style>
</head>
<body>

<nav>
  <a class="logo" href="#"><span class="logo-dot"></span>Learnova</a>
  <div class="nav-links">
    <a href="#">How it works</a>
    <a href="#" class="active">Curriculum</a>
    <a href="#">For families</a>
    <a class="btn-nav" href="#">Start Free</a>
  </div>
</nav>

<div class="page-header">
  <div class="breadcrumb">Home <span>→ Curriculum</span></div>
  <h1>Explore the <em>curriculum</em></h1>
  <p class="header-sub">Browse all lessons by grade and subject. Everything is free, structured, and ready to use.</p>
</div>

<div class="grade-tabs-wrap">
  <div class="grade-tabs" id="gradeTabs">
    <button class="grade-tab" data-grade="K">Kindergarten</button>
    <button class="grade-tab" data-grade="1">Grade 1</button>
    <button class="grade-tab active" data-grade="2">Grade 2</button>
    <button class="grade-tab" data-grade="3">Grade 3</button>
    <button class="grade-tab" data-grade="4">Grade 4</button>
    <button class="grade-tab" data-grade="5">Grade 5</button>
    <button class="grade-tab" data-grade="6">Grade 6</button>
    <button class="grade-tab" data-grade="7">Grade 7</button>
    <button class="grade-tab" data-grade="8">Grade 8</button>
  </div>
</div>

<div class="main">
  <!-- SIDEBAR -->
  <aside class="sidebar">
    <div class="sidebar-section">
      <span class="sidebar-label">Subject</span>
      <button class="subject-btn active" data-subject="all">
        <span class="subject-icon" style="background:#F1EFE8">📚</span> All Subjects
      </button>
      <button class="subject-btn" data-subject="math">
        <span class="subject-icon s-math">🔢</span> Mathematics
      </button>
      <button class="subject-btn" data-subject="english">
        <span class="subject-icon s-english">📖</span> English & Reading
      </button>
      <button class="subject-btn" data-subject="science">
        <span class="subject-icon s-science">🔬</span> Science
      </button>
      <button class="subject-btn" data-subject="social">
        <span class="subject-icon s-social">🌎</span> Social Studies
      </button>
      <button class="subject-btn" data-subject="art">
        <span class="subject-icon" style="background:var(--blue-light)">🎨</span> Art & Music
      </button>
    </div>
    <div class="sidebar-section">
      <span class="sidebar-label">Duration</span>
      <div class="filter-group">
        <label class="filter-opt"><input type="checkbox" checked> Under 20 min</label>
        <label class="filter-opt"><input type="checkbox" checked> 20–30 min</label>
        <label class="filter-opt"><input type="checkbox" checked> 30+ min</label>
      </div>
    </div>
    <div class="sidebar-section">
      <span class="sidebar-label">Type</span>
      <div class="filter-group">
        <label class="filter-opt"><input type="checkbox" checked> Lesson</label>
        <label class="filter-opt"><input type="checkbox" checked> Activity</label>
        <label class="filter-opt"><input type="checkbox" checked> Assessment</label>
      </div>
    </div>
  </aside>

  <!-- CONTENT -->
  <div class="content">
    <div class="content-header">
      <div>
        <div class="content-title" id="contentTitle">Grade 2 — All Subjects</div>
        <div class="content-count" id="contentCount">24 lessons across 6 units</div>
      </div>
      <div class="search-bar">
        <span class="search-icon">🔍</span>
        <input type="text" placeholder="Search lessons…" id="searchInput" />
      </div>
    </div>
    <div class="units" id="unitList"></div>
  </div>
</div>

<script>
const curriculum = {
  math: {
    label: "Mathematics", bar: "bar-math", pill: "pill-math",
    units: [
      {
        title: "Numbers & Place Value", sub: "Understanding hundreds, tens, and ones",
        lessons: [
          { name: "Counting to 1,000", tags: ["Lesson", "Interactive"], duration: "20 min" },
          { name: "Place Value with Base-10 Blocks", tags: ["Activity"], duration: "25 min" },
          { name: "Comparing & Ordering Numbers", tags: ["Lesson"], duration: "20 min" },
          { name: "Place Value Assessment", tags: ["Assessment"], duration: "15 min" },
        ]
      },
      {
        title: "Addition & Subtraction", sub: "Strategies for adding and subtracting within 1,000",
        lessons: [
          { name: "Adding 2-Digit Numbers", tags: ["Lesson"], duration: "20 min" },
          { name: "Subtraction with Regrouping", tags: ["Lesson", "Activity"], duration: "30 min" },
          { name: "Word Problems: Add & Subtract", tags: ["Activity"], duration: "25 min" },
        ]
      },
      {
        title: "Introduction to Multiplication", sub: "Arrays, groups, and repeated addition",
        lessons: [
          { name: "What is Multiplication?", tags: ["Lesson"], duration: "20 min" },
          { name: "Making Arrays", tags: ["Activity"], duration: "20 min" },
          { name: "Skip Counting as Multiplication", tags: ["Lesson"], duration: "15 min" },
        ]
      }
    ]
  },
  english: {
    label: "English & Reading", bar: "bar-english", pill: "pill-english",
    units: [
      {
        title: "Phonics & Decoding", sub: "Long vowels, blends, and digraphs",
        lessons: [
          { name: "Long Vowel Sounds Review", tags: ["Lesson"], duration: "15 min" },
          { name: "Consonant Blends: BL, CL, FL", tags: ["Lesson", "Activity"], duration: "20 min" },
          { name: "Silent E Words", tags: ["Activity"], duration: "20 min" },
        ]
      },
      {
        title: "Reading Comprehension", sub: "Understanding fiction and nonfiction texts",
        lessons: [
          { name: "Finding the Main Idea", tags: ["Lesson"], duration: "20 min" },
          { name: "Story Structure: Beginning, Middle, End", tags: ["Lesson"], duration: "25 min" },
          { name: "Making Predictions", tags: ["Activity"], duration: "20 min" },
          { name: "Comprehension Check", tags: ["Assessment"], duration: "20 min" },
        ]
      },
      {
        title: "Writing", sub: "Sentences, paragraphs, and personal narratives",
        lessons: [
          { name: "Writing Complete Sentences", tags: ["Lesson"], duration: "20 min" },
          { name: "Paragraph Structure", tags: ["Lesson", "Activity"], duration: "25 min" },
          { name: "Personal Narrative: Draft & Revise", tags: ["Activity"], duration: "35 min" },
        ]
      }
    ]
  },
  science: {
    label: "Science", bar: "bar-science", pill: "pill-science",
    units: [
      {
        title: "Matter & Its Properties", sub: "Solids, liquids, gases, and their properties",
        lessons: [
          { name: "What is Matter?", tags: ["Lesson"], duration: "20 min" },
          { name: "Solids, Liquids & Gases", tags: ["Lesson", "Activity"], duration: "25 min" },
          { name: "Changing States of Matter", tags: ["Activity"], duration: "30 min" },
        ]
      },
      {
        title: "Plants & Life Cycles", sub: "How plants grow and reproduce",
        lessons: [
          { name: "Parts of a Plant", tags: ["Lesson"], duration: "20 min" },
          { name: "Seed to Plant: Life Cycle", tags: ["Lesson"], duration: "25 min" },
          { name: "Plant Needs Experiment", tags: ["Activity"], duration: "35 min" },
        ]
      }
    ]
  },
  social: {
    label: "Social Studies", bar: "bar-social", pill: "pill-social",
    units: [
      {
        title: "Maps & Communities", sub: "Reading maps and understanding community types",
        lessons: [
          { name: "Parts of a Map", tags: ["Lesson"], duration: "20 min" },
          { name: "Urban, Suburban & Rural", tags: ["Lesson", "Activity"], duration: "25 min" },
          { name: "My Community Map", tags: ["Activity"], duration: "30 min" },
        ]
      },
      {
        title: "American History Basics", sub: "Key figures and events in early America",
        lessons: [
          { name: "Native American Communities", tags: ["Lesson"], duration: "25 min" },
          { name: "The Thirteen Colonies", tags: ["Lesson"], duration: "20 min" },
          { name: "American Heroes", tags: ["Activity"], duration: "20 min" },
        ]
      }
    ]
  },
  art: {
    label: "Art & Music", bar: "bar-art", pill: "pill-art",
    units: [
      {
        title: "Elements of Art", sub: "Line, shape, color, and texture",
        lessons: [
          { name: "Lines & Shapes in Art", tags: ["Lesson", "Activity"], duration: "25 min" },
          { name: "Color Mixing & the Color Wheel", tags: ["Activity"], duration: "30 min" },
          { name: "Texture in Artwork", tags: ["Activity"], duration: "25 min" },
        ]
      },
      {
        title: "Music Foundations", sub: "Rhythm, melody, and listening",
        lessons: [
          { name: "Beat & Rhythm", tags: ["Lesson", "Activity"], duration: "20 min" },
          { name: "High & Low Sounds", tags: ["Activity"], duration: "15 min" },
        ]
      }
    ]
  }
};

let activeSubject = "all";
let activeGrade = "2";

function getSubjects() {
  return activeSubject === "all" ? Object.keys(curriculum) : [activeSubject];
}

function totalLessons(subjects) {
  return subjects.reduce((acc, s) => acc + curriculum[s].units.reduce((a, u) => a + u.lessons.length, 0), 0);
}

function totalUnits(subjects) {
  return subjects.reduce((acc, s) => acc + curriculum[s].units.length, 0);
}

function subjectLabel() {
  if (activeSubject === "all") return "All Subjects";
  return curriculum[activeSubject].label;
}

function gradeLabel() {
  return activeGrade === "K" ? "Kindergarten" : `Grade ${activeGrade}`;
}

function renderUnits(search = "") {
  const subjects = getSubjects();
  const list = document.getElementById("unitList");
  list.innerHTML = "";

  let unitIdx = 0;
  let hasAny = false;

  subjects.forEach(subj => {
    const data = curriculum[subj];
    data.units.forEach(unit => {
      const filteredLessons = unit.lessons.filter(l =>
        !search || l.name.toLowerCase().includes(search.toLowerCase())
      );
      if (search && filteredLessons.length === 0) return;
      hasAny = true;
      unitIdx++;

      const card = document.createElement("div");
      card.className = "unit-card";
      card.innerHTML = `
        <div class="unit-header">
          <div class="unit-color-bar ${data.bar}"></div>
          <div class="unit-meta">
            <div class="unit-top">
              <span class="unit-num">Unit ${unitIdx}</span>
              <span class="unit-pill ${data.pill}">${data.label}</span>
            </div>
            <div class="unit-title">${unit.title}</div>
            <div class="unit-sub">${unit.sub}</div>
          </div>
          <div class="unit-right">
            <span class="unit-lessons-count">${filteredLessons.length} lesson${filteredLessons.length !== 1 ? "s" : ""}</span>
            <span class="chevron">▾</span>
          </div>
        </div>
        <div class="lessons-list">
          ${filteredLessons.map((l, i) => `
            <div class="lesson-item">
              <div class="lesson-num">${i + 1}</div>
              <div class="lesson-info">
                <div class="lesson-name">${l.name}</div>
                <div class="lesson-tags">${l.tags.map(t => `<span class="lesson-tag">${t}</span>`).join("")}</div>
              </div>
              <span class="lesson-duration">⏱ ${l.duration}</span>
              <span class="lesson-arrow">›</span>
            </div>
          `).join("")}
        </div>
      `;

      card.querySelector(".unit-header").addEventListener("click", () => {
        card.classList.toggle("open");
      });

      if (search) card.classList.add("open");
      list.appendChild(card);
    });
  });

  if (!hasAny) {
    list.innerHTML = `<div class="empty"><div class="empty-icon">🔍</div><h3>No lessons found</h3><p>Try a different search term or adjust your filters.</p></div>`;
  }

  const visibleSubjects = subjects.filter(s =>
    curriculum[s].units.some(u => !search || u.lessons.some(l => l.name.toLowerCase().includes(search.toLowerCase())))
  );
  const lessonsShown = visibleSubjects.reduce((acc, s) =>
    acc + curriculum[s].units.reduce((a, u) =>
      a + u.lessons.filter(l => !search || l.name.toLowerCase().includes(search.toLowerCase())).length, 0), 0);
  const unitsShown = visibleSubjects.reduce((acc, s) =>
    acc + curriculum[s].units.filter(u => !search || u.lessons.some(l => l.name.toLowerCase().includes(search.toLowerCase()))).length, 0);

  document.getElementById("contentTitle").textContent = `${gradeLabel()} — ${subjectLabel()}`;
  document.getElementById("contentCount").textContent = hasAny
    ? `${lessonsShown} lesson${lessonsShown !== 1 ? "s" : ""} across ${unitsShown} unit${unitsShown !== 1 ? "s" : ""}`
    : "No results";
}

// Grade tabs
document.getElementById("gradeTabs").addEventListener("click", e => {
  const tab = e.target.closest(".grade-tab");
  if (!tab) return;
  document.querySelectorAll(".grade-tab").forEach(t => t.classList.remove("active"));
  tab.classList.add("active");
  activeGrade = tab.dataset.grade;
  renderUnits(document.getElementById("searchInput").value);
});

// Subject buttons
document.querySelectorAll(".subject-btn").forEach(btn => {
  btn.addEventListener("click", () => {
    document.querySelectorAll(".subject-btn").forEach(b => b.classList.remove("active"));
    btn.classList.add("active");
    activeSubject = btn.dataset.subject;
    renderUnits(document.getElementById("searchInput").value);
  });
});

// Search
document.getElementById("searchInput").addEventListener("input", e => {
  renderUnits(e.target.value);
});

// Init
renderUnits();
</script>
